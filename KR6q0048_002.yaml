笑一夕遁去北抵襄沔太守公昌言恨見之晚時洞山谷隱皆虗席太守敦請師辭前後八請堅臥不答淳化四年首山歿西河道俗千餘人協心削牘遣沙門契聰迎請住持汾州太平寺太子院師閉關高枕聰排闥而入讓之曰佛法大事靜退小節風穴懼應讖憂宗旨墜滅幸而有先師先師已棄世汝有力荷擔如來大法者今何時而欲安眠哉師矍起握聰手曰非公不聞此語促辦嚴吾行矣既至宴坐一榻足不越閫者三十年天下道俗仰慕不敢名同曰汾州垂三訣第一訣佛祖曾超越莫話未生前休論心路絶第二訣動靜誰甄別龜毛扇子扇泥牛一點血第三訣江南并兩浙春和萬樹花冬冷千巖雪上堂謂衆曰夫說法者須具十智同真若不具十智同真邪正不辨緇素不分不能與人天為眼目決斷是非如鳥飛空而折翼如箭射的而斷絃絃斷故射的不中翼折故空不可飛絃壯翼牢空的俱徹作麼生是十智同真與諸上座點出一同一質二同大事三總同參四同真志五同遍普六同具足七同得失八同生殺九同音吼十同得入又曰與甚麼人同得入俊趂不及與阿誰同音吼面南看北斗作麼生是同生殺向上一路滑甚麼物同得失判官手裏筆阿那箇同具足如賊入空屋是甚麼同遍普蟭螟吞却虎何人同真志無是無不是孰能總同參特地口喃喃那箇同大事山形拄杖子何物同一質三九二十七有點得出底麼點得出者不吝慈悲點不出來未有參學眼在十智同真面目全于中一智是根源若人欲見汾陽老擘破三玄作兩邊龍德府尹李矦與師有舊請師主承天使者三至不赴使者受罰復至曰必得師俱往不然有死而已師曰老病業已不出山借往當先後之何必俱耶使者曰師諾則先後惟所擇師乃令設饌俶裝告衆曰老僧去也誰人隨得一僧出曰某甲隨得師曰汝日行幾里曰五十里師曰汝隨我不得又一僧出曰某甲日行七十里師曰汝亦隨我不得侍者出曰某甲隨得但和尚到處即到師曰汝乃隨得老僧復顧使者曰吾先行矣停箸而化侍者即立化于側閲世七十有八坐五十六夏嗣法一十一人同時得證者六人石霜圓琅琊覺大愚芝谷泉道法華舉天聖泰參遍諸方猶未瞥一言之下絶狐疑碧潭萬古閒明月象子翻身正是時闍維收舍利起塔第十一世潭州石霜楚圓慈明禪師汾陽嗣全州清湘李氏子少為書生年二十二依城南湘山隱靜寺得度其母有賢行使之遊方師連眉秀目頎然豐碩然忽繩墨所至為老宿所呵以為少叢林師崖柴而笑曰龍象蹴踏非驢所堪嘗橐骨董箱以竹杖荷之遊襄沔間與守芝谷泉俱結伴入洛中聞汾陽昭禪師道望為天下第一決志親依時朝廷方問罪河東潞澤皆屯重兵多勸其無行師不顧渡大河登太行易衣類廝養竄名火隊中露眠草宿至龍州遂造汾陽昭公壯之經二年未許入室師詣昭昭揣其志必詬罵使令者或毀詆諸方及有所訓皆流俗鄙事一夕訴曰自至法席已再夏不蒙指示但增世俗塵勞念歲月飄忽己事不明失出家之利語未卒昭公熟視罵曰是惡知識敢裨販我怒舉杖逐之師擬伸救昭公掩其口師大悟曰乃知臨濟道出常情服役七年辭去依唐明嵩禪師以母老南歸依洞山聰禪師為首座宜春太守黃宗旦請出世南源住三年棄去謁神鼎諲禪師鼎首山高弟望尊一時衲子非人類精奇無敢登其門者師長髮不剪弊衣楚音通謁稱法侄一衆大笑鼎遣童子問長老誰之嗣師仰視屋曰親見汾陽來鼎杖而出顧見欣然問曰汾州有西河獅子是否師指其後絶呌曰屋倒矣童子返走鼎回顧師地坐脫隻履而視之諲老忘所問又失師所在師徐起整衣且行且語曰見面不如聞名遂去諲遣人追之不可嘆曰汾陽乃有此兒耶師自是名重叢林會道吾虗席諲力推師主之法令整肅亡軀為道者集焉次住石霜大振臨濟之道示衆以拄杖擊禪牀一下云大衆還會麼不見道一擊忘所知更不假修治諸方達道者咸言上上機香嚴恁麼悟去分明悟得如來禪祖師禪未夢見在且道祖師禪有甚長處若向言中取則誤賺後人直饒棒下承當孤負先聖萬法本間惟人自閙所以山僧居福嚴只見福嚴境界晏起早眠有時雲生碧嶂有時月落寒潭音聲鳥飛鳴般若臺前娑羅花香散祝融峯畔把瘦笻坐盤陀石與五湖衲子時話玄微灰頭土面住興化只見興化家風迎來送去門連城市車馬駢填漁唱瀟湘猿啼嶽麓絲竹歌謠時時入耳復與四海高人日談禪道歲月都忘且道居深山住城郭還有優劣也無試道看良久云是處是慈氏無門無善財師平生以事事無礙行心凡聖所不能測室中晏坐橫刀水盆之上旁置草鞋使來參扣者下語以卜契機康定庚辰正月五日示寂塔于石霜嗣法一十七人汾陽有全機大用使慈明向機下脫羅籠神鼎有赤手殺人超羣眼目正是大方獨步無餘物任運騰騰只麼行第十二世楊岐方會禪師慈明嗣袁州宜春冷氏子少警敏不事筆硯及出家閲經典輒自神會慈明總院事依之雖久然未有省發每咨參明曰庫司事繁且去他日又問明曰監事異日兒孫遍天下在何用忙為一日明適出雨忽作師偵之小徑既見遂搊住曰這老漢今日須與我說不說打你去明曰監事知是般事便休語未卒師大悟即拜於泥塗問曰狹路相逢時如何明曰你且躲避我要那裏去師歸來日具威儀詣方丈禮謝明呵曰未在一日明上堂師出問幽鳥語喃喃辭雲入亂峯時如何明曰我行荒草裏汝又入深村師曰官不容針更借一問明便喝師曰好喝明又喝師亦喝明連喝師禮拜明曰此事是箇人方能擔荷師拂袖便行展則成掌握則成拳一日慈明問師馬祖見讓師便悟去且道迷却在甚麼處師曰要悟即易要迷即難明移興化師辭歸九峯後道俗迎居楊岐道法大振次遷雲蓋皇祐元年示寂塔于本山嗣法四人三腳驢子弄蹄行騰騰步步契無生楊岐知你猶未省湖南長老兩眉橫臨濟七傳而得石霜圓圓之子一為積翠南一為楊岐會南之設施如坐四達之衢聚珍怪百物而鬻之遺簪墮珥隨所探焉末流未免冒濫會如玉人之治璠璵故其子孫皆光明照人克世其家蓋碧落無贋本也第十三世舒州白雲守端禪師楊岐嗣衡陽葛氏子幼事翰墨冠依茶陵郁禪師披削往參楊岐岐問受業師為誰師曰茶陵郁和尚岐曰吾聞伊過橋遭攧有省作偈甚奇能記否師誦曰我有明珠一顆久被塵勞關鎖今朝塵盡光生照破山河萬朵岐笑而趨起師愕然通夕不寐黎明咨詢之適歲暮岐曰汝見昨日打驅儺者麼曰見岐曰汝一籌不及渠師愈大駭曰何謂也岐曰渠愛人笑汝怕人笑師大悟巾侍久之辭遊廬阜圓通訥禪師舉住承天聲名籍甚次徙法華龍門興化海會所至衆如雲集武陵溪畔杜鵑語十里桃花血染紅示衆云佛身充滿于法界普現一切羣生前隨緣赴感靡不周而常處此菩提座大衆作麼生說箇隨緣赴感底道理祇於一彈指間盡大地含生根機一時應得周足而未嘗動著一毫頭便且喚作隨緣赴感而常處此座祇如山僧此者受法華請相次與大衆相別去宿松縣裏開堂了方歸院去且道還離此座也無若道離則世諦流布若道不離作麼生見得箇不離底事莫是無邊剎境自他不隔於毫端十世古今始終不離於當念又莫是一切無心一時自遍麼若恁麼正是掉棒打月到者裏直須悟始得悟後更須遇人始得若悟了遇人當垂手方便之時著著自有出身之路若祇得乾蘿蔔頭底不惟瞎却學者眼兼自己動便先傷鋒犯手大衆須知悟了遇人者向十字街頭與人相逢却在千峯頂上握手千峯頂上相逢却在十字街頭握手所以山僧嘗有頌云他人住處我不住他人行處我不行不是為人難共聚大都緇素要分明此事如萬仞崖頭放著手便撲到底只是捨命不得熙寧五年示寂嗣法六人白雲抱珠被楊岐一笑直下如桶底脫正是忽然通達了無礙萬里山河現本光第十四世蘄州五祖法演禪師白雲嗣綿州鄧氏子年三十五始棄家祝髮受具往成都習唯識百法等論因聞菩薩入見道時智與理冥境與神會不分能證所證外道難曰既不分能證所證却以何為證無能對者師至彼救此義曰如人飲水冷暖自知乃通其難師曰冷暖則可知矣如何是知底事遂往質本講本講曰汝欲明此當往南方扣傳佛心宗者師即負笈出關所見尊宿無不以此咨決所疑終不破遂謁浮山遠禪師請益前話遠云我有箇譬喻說似你你似箇三家村裏賣柴漢子把箇匾擔橫在腰向十字街頭立地問人中書堂今日商量甚麼事師默計云若如此大故未在遠一日語師曰吾老矣恐虗度子光陰可往依白雲此老雖後生吾未識面但見其頌臨濟三頓棒話有過人處必能了子大事師潸然禮辭至白雲遂舉僧問南泉摩尼珠話請問雲叱之師領悟獻投機偈曰山前一片間田地叉手叮嚀問祖翁幾度賣來還自買為憐松竹引清風雲特印可令掌磨事未幾雲至語師曰有數禪客自廬山來皆有悟入處教伊說亦說得有來繇舉因緣問伊亦明得教伊下語亦下得祇是未在師于是大疑私自計曰既悟了說亦說得明亦明得如何却未在遂參究纍日忽然省悟從前寶惜一時放下走見白雲雲為手舞足蹈師亦一笑而已師後曰吾因茲出一身白汗便明得下載清風圓悟一日請益臨濟四賓主怎生師云也祇是箇程限是甚麼間事又云我者裏却似馬前相朴倒便休師垂語曰譬如水牯牛過窗櫺頭角四蹄都過了因甚尾巴過不得時山門有土木之役躬往督之且曰汝等勉力吾不復來矣歸丈室淨髮澡身迄旦吉祥而化是夕山摧石殞四十里內巖谷震吼闍維舍利如雨塔于東山之南嗣法一十三人門裏出身易身裏出門難打破大唐無覓處浮生穿鑿沒相干古人不叨濫為人亦不埋沒諸方眼目如浮山指五祖見白雲真退己讓人萬中無一使演公傾心其道一撥投機所謂朝來脫盡娘生褲清風明月杖頭挑第十五世成都府昭覺寺克勤佛果圜悟禪師五祖嗣彭州洛氏子業儒兒時日記千言偶遊妙寂寺見佛書三復悵然如獲舊物曰豫殆過去沙門也即去家依自省祝髮從文照通講說又從敏行授楞嚴俄得病瀕死嘆曰諸佛涅槃正路不在文句中吾欲以聲求色見宜其無以死也遂棄去至真覺勝禪師之席勝方創背出血指示師曰此曹溪一滴也師矍然良久曰道固如是乎即徒步出蜀首謁玉泉皓次依金鑾信大溈哲黃龍心東林度僉指為法器而晦堂稱他日臨濟一派屬子矣最後見五祖盡其機用祖皆不諾乃忿然而去祖曰待你著一頓熱病打時方思量我在師到金山染傷寒困極以平日見處試之無得力者追繹五祖之言乃自誓曰我病稍間即歸五祖病痊尋歸祖一見而喜令入侍者寮方半月會部使者解印還蜀詣祖問道祖曰提刑少年曾讀小艷詩否有兩句頗相近頻呼小玉元無事祇要檀郎認得聲提刑應喏喏祖曰且仔細師適歸侍立次問曰聞和尚舉小艷詩提刑會否祖曰他祇認得聲師曰祇要檀郎認得聲他既認得聲為甚麼却不是祖曰如何是祖師西來意庭前柏樹子聻師忽有省遽出見雞飛上闌干鼓翅而鳴復自謂曰此豈不是聲遂袖香入室通所得呈偈曰金鴨香銷錦繡幃笙歌叢裏醉扶歸少年一段風流事祇許佳人獨自知祖曰佛祖大事非小根劣品所能造詣吾助汝喜祖遍謂山中耆舊曰我侍者參得禪也繇此所至推為上首任他深如滄海亦要掀翻更有高似青天也須打落示隆知藏五祖老師平生孤峻少許可人乾嚗嚗地壁立只靠此一著常自云如倚一座須彌山豈可落虗弄滑頭謾人把箇沒滋味鐵餕餡劈頭拈似學者令咬嚼須待渠桶底子脫喪却如許惡知惡見胸次不掛絲毫透得淨盡始可下手鍛鍊方禁得拳踢然後示以金剛王寶劒度其果能踐履負荷淨然無一事山是山水是水更應轉向那邊千聖羅籠不肯住處便契乃祖以來傳持正法眼藏及至應用為物仍當驅耕夫牛奪饑人食證驗得十成無滲漏即是本家道流也摩竭提國親行此令少林面壁全提正宗而時流錯認遂尚泯默以為無縫罅無摸索壁立萬仞殊不知本分事但恣情識摶量便為高見此大病也巖頭云只露目前些子箇如擊石火閃電光若搆不得不用疑著此是向上人行履處趙州喫茶去祕魔巖擎杈雪峯輥毬禾山打鼓俱胝一指歸宗拽石玄沙未徹德山棒臨濟喝並是透頂透底直截剪斷葛藤大機大用千差萬別會歸一源可以與人解粘去縛若隨語作解即須與本分草料如十斛驢乳只以一滴師子乳滴悉皆迸散要腳下傳持相繼錦遠末後一句始到牢關誠哉是言透脫死生提持正令全是此箇時節惟踏著上頭關棙子底便諳悉也佛果問五祖云二祖覓心了不可得畢竟如何五祖道須自參始得這些好處別人為汝著力不得參來參去忽因聞檀郎認得聲倏然桶底脫庭前柏樹子也透麻三斤也是玄沙蹉過也是睦州擔板也是不落因果也是不昧因果也是三乘十二分教二六時中眼裏耳裏乃至鐘鳴鼓響驢鳴犬吠無非這箇消息示杲書記臨濟正宗自馬師黃檗闡大機大用脫羅籠出窠臼虎驟龍馳星飛電激卷舒擒縱皆據本分綿綿的的到興化風穴唱愈高機愈峻西河弄師子霜華奮金剛王非深入閫奧親受印記莫知端倪大抵負冲天氣宇格外提持不戰屈人兵殺人不眨眼尚未髣佛其趣向況移星換斗轉天輪回地軸耶是故示三玄三要四料簡四賓主金剛王寶劒踞地師子一喝不作一喝用探竿影草一喝分賓主照用一時行許多落索多少學家摶量注解殊不知我王庫內無如是刀弄將出來看底只眨得眼須是他上流契證認正按旁提須還本分種草豈假梯媒要扶荷正宗提持宗眼須是透頂透底徹骨徹髓不涉廉纖迥然獨脫然後的的相承繼他馬祖百丈首山楊岐不為參竊爾紹興五年八月示微恙趺坐書偈遺衆投筆而逝茶毗舌齒不壞舍利五色無數塔于昭覺寺側嗣法三十一人一聲喚醒千秋夢無限風光更屬誰舉目了然非外物月明依舊照花枝第十六世平江虎丘紹隆禪師昭覺嗣和州含山人也九歲出家於佛慧院既長遊方初謁長蘆信禪師得其大略有傳佛果語至者師讀之嘆曰想酢生液雖未澆腸沃胃要且使人慶快第恨未聆謦咳耳遂由寶峯依湛堂客黃龍扣死心禪師次謁佛果一日入室果問曰見見之時見非是見見猶離見見不能及舉拳曰還見麼師曰見果曰頭上安頭師聞脫然契證果叱曰見箇甚麼師曰竹密不妨流水過果肯之尋俾掌藏教有問佛果曰隆藏主柔易若此何能為哉果曰瞌睡虎耳後郡守李公光延居彰教次徙虎丘道大顯著上堂曰凡有展托盡落今時不展不托墮坑落塹直饒風吹不入水灑不著揀點將來自救不了豈不見道直似寒潭月影靜夜鐘聲隨扣擊以無虧觸波瀾而不散猶是生死岸頭事拈拄杖劃一劃曰劃斷古人多年葛藤紹興丙辰逝塔全軀于寺西南嗣法一人佛果為紹隆向歷落地拈出吹毛劒纖悉俱斬隆師尋避無地亦火裏蝍蟟銜月走也第十七世明州天童應菴曇華禪師虎丘嗣蘄州江氏子生而奇傑不類凡兒年十七依於東禪剃髮首謁遂和尚略得染指法味於是遍參知識靡所契證聞佛果住雲居煅煉學者師往禮依侍果乃痛與錐劄值果返蜀指見虎丘隆禪師侍一載頓明大事已而訪此菴元命分座於是開堂妙嚴遷歸宗時大慧在梅陽有僧傳師示衆語大慧見之極口稱嘆復寄偈曰坐斷金輪第一峯千妖百怪盡潛踪年來又得真消息報道楊岐正脉通當時與大慧同稱為二甘露門常誡徒曰衲僧家著草鞋住院何啻如蚖蛇戀窟乎隆興改元六月化塔全身于本山嗣法一人機關破盡一時休自此歸家得自由干戈卸盡狼烟息太平無事臥虎丘第十八世明州天童密菴咸傑禪師應菴嗣福州鄭氏子其母夢廬山老僧入舍遂舉師自幼頴異過人及壯剃髮進具遍參知識最後謁應菴華和尚於衢州明果菴一日問曰如何是正法眼答曰破沙盆應菴頷之說偈曰大徹投機句當陽廓頂門相逢今四載徵詰洞無痕雖未付鉢袋氣宇吞乾坤却把正法眼喚作破沙盆此行將省覲切忌便跺跟吾有末後句待歸要汝遵後出世住衢州烏巨次遷祥符蔣山華藏未幾奉詔住徑山及靈隱嗣法七人巨賈通商到海門傾家買箇破砂盆歸來到處誇奇特十字街頭笑殺人第十九世破菴先禪師密菴嗣廣安王氏子後出世上堂云不是心不是佛不是物忍俊不禁為諸人作箇撇脫拈拄杖卓一下云流水暗消溪畔石勸人除却是非難嗣法三人示楞嚴座主偈曰見猶離見非真見還盡八還無可還木落秋空山骨露不知誰識老瞿曇第二十世徑山無準師範禪師破菴嗣生雍氏蜀之梓州人也九歲依陰平山道欽出家初請益成都老宿名堯者坐禪之法堯曰禪是何物坐底是誰師晝夜體究一日如廁提前話有省次謁育王佛照禪師照問何處人師曰劒州照曰帶得劒來麼師隨聲便喝照笑之至靈隱破菴先禪師居第一座一日遊石筍菴師隨侍有道者問曰胡孫子捉不住願垂開示破菴曰用捉他作麼如風吹水自然成紋師在傍忽大悟異日開堂拈香遂嗣破菴先禪師焉嘗受詔住徑山賜師號曰佛鑑禪師宋淳祐己酉三月十五日示寂其徒請遺偈乃執筆書云來時空索索去也赤條條要更問端的天台有石橋移頃而逝塔全身於圓照菴嗣法九人吹毛寶劒利鋒鋩喝震如雷孰敢當及至破家窮徹骨通身脫白杳無光第二十一世仰山雪巖祖欽禪師無準嗣師初參鐵橛遠次參天目禮禮公為松源嫡子師敬慕之懷香造其室禮曰汝豈不見臨濟三度問黃檗佛法的的大意三遭痛棒末後向大愚肋下築三拳道原來黃檗佛法無多子汝但恁麼看師不喜而出依舊自作主意每常坐禪一日才上蒲團面前豁然一開如地陷一般自此目前淨裸裸地半月餘日動相不生然於中夜睡著無夢無想無聞無見之地又却打作兩橛凡古人公案有義路可以咬嚼者則理會得下無義路如銀山鐵壁者却都不會故雖在徑山無準和尚會下多年每遇入室舉主人公便可打箇𨁝跳若舉衲僧巴鼻佛祖爪牙更無有下口處如是十年不得徹悟後過浙東天目兩山依住一日佛殿前行忽然擡眸見一株古柏觸著向來所得境界和底一時揚下礙膺之物撲然而散自謂如暗室中在白日之下走一轉相似方始得見徑山老人立地處正好三十拄杖師後出世潭州龍興晚住袁州仰山住持凡六剎無準忌日師拈香云盡道先師今日死誰知今日是生朝不知却有何憑據紫柏黃檀一處燒嗣法六人閒行閒忖忽擡頭古柏蒼蒼豁兩眸從此礙膺和底脫一香拈出有來繇第二十二世天目高峯原妙禪師雪巖嗣吳江徐氏子十五出家於秀水密印寺二十八杭之淨慈立死限三年學禪一日父兄尋訪巍然不顧初參斷橋倫令看生從何來死從何去話脅不至席口體俱忘或如廁中單而出又嘗發函忘扃鐍有同參僧顯慨然曰吾己事弗克辦曷若輔之有成於是朝夕侍奉惟謹時雪巖欽禪師寓北㵎師懷香往扣之方問訊即打出閉却門一再往始得親近令看無字話自此參扣無虗日巖忽問阿誰與你拖箇死尸來聲未絶便打出如是不知其幾一日少林忌辰隨衆詣三塔諷經次忽擡頭覩五祖演和尚真讚曰百年三萬六千朝返覆元來是者漢驀然打破拖死尸之疑時年二十四矣先是雪巖移南明師解夏即往省之巖一見便問阿誰與你拖箇死尸到者裏師便喝巖拈棒師把住云今日打某甲不得曰為甚打不得師拂袖便出自此機鋒不讓一日巖問曰日間浩浩時作得主麼師云作得主又問睡夢中作得主麼師云作得主又問正睡著時無夢無想無見無聞主在甚麼處師無語巖囑曰從今日去也不要你學佛學法也不要你窮古窮今但只饑來喫飯困來打眠才眠覺來却抖擻精神我者一覺主人公畢竟在甚麼處安身立命丙寅冬奮志入臨安龍鬚自誓曰一生作箇癡呆漢決要者一著子明白越五載因同參僧推枕子墮地作聲廓然大徹自謂如泗州見大聖遠客還故鄉元來只是舊時人不改舊時行履處後入天目獅子巖最險絶處立死關髮長不剪截甕為鐺併日一食宴如也時巖住大仰三喚不起乃付麈拂印記後成叢席其道大振遂有他方異域越重海萬山而來者至元乙未冬示寂辭衆曰西峯三十年妄談般若罪犯彌天末後一句子不敢纍及平人自領去也大衆還有知落處者麼良久云毫釐有差天地懸隔復說偈曰來不入死關去不出死關鐵蛇鑽入海撞倒須彌山泊然而逝啓龕七日端坐如生塔全身于死關信士全從進得所剪髮朝夕供養舍利壘壘如珠貫焉嗣法四人沙裏淘金金裏沙至親翻作惡冤家枕頭打破冤家窟鼻孔撩天是甚麼無夢無想主何處白汗出身念無起枕子落地笑呵呵伸手原在縮手裏第二十三世天目中峯明本禪師高峯嗣杭之錢塘人俗姓孫母李氏夢無門開道者持燈籠至家遂生師師神儀挺異具大人相離襁褓便趺坐能言便歌讚梵唄雖嬉戲必為佛事九歲喪母十五立誓出家禮佛燃臂誓持五戒日誦法華諸經夜則常行困極以首觸柱自警甫冠閲傳燈至菴摩羅女問曼殊明知生是不生之理為甚麼却被生死之所流轉於是致疑一日誦金剛經至荷擔如來恍然開解內外典籍輒知義趣而師自謂識量依通非悟也遂從高峯剃落於師子院時年二十四觀流泉有省詣峯求證峯打趂之適民間訛傳官選童男女師因問峯曰忽有人來問和尚討童男女時如何峯曰我但度竹篦子與他師言下無礙於是高峯書真讚付師曰我相不思議佛祖莫能視獨許不肖兒見得半邊鼻且俾參徒詣師請益由是學者輻凑歸之如水就下而師猶自韜晦未嘗肯以師道自處一時宰相公卿上及天子每虗徑山靈隱諸大剎齎幣迎師卒不可致或踰山泛海以逃是故居無常處然所過之地皆成寶坊緇素男女無貴賤皆望塵拜伏金帛之供一視而已師初侍高峯於死關晝則作務夜則禪寂剋勵嚴苦脅不沾席者十年詰究研窮始承記莂自高峯化後師或船或庵傍以幻住又朝廷聞師道風賜佛慈圓照廣慧禪師之號一時王公駙馬莫不致禮翰林承旨趙公孟俯事以師禮時問法要晚居天目癸亥八月示疾有來省者謂曰幻住菴上漏旁穿籬坍壁倒不可久住也語笑如平時或強之服藥曰青天白日曲狥人情耶揮去十三日手寫偈遺別外護及法屬故舊十四早辭衆曰我有一句分付大衆更問如何無本可據置筆安坐而化塔全身於望江石嗣法四人口若洪波翻騰大海心如明月照耀古今慣行有眼棒善操沒弦琴只此半邊鼻孔不知若箇是知音第二十四世伏龍聖壽寺千巖元長禪師中峯嗣蕭山縣人也俗姓董家世宗儒父九鼎母何氏晚而生師欲棄之嫂謝氏趨救鞠為子七歲即就外傅諸書經目輒成誦出入莊重有若成人其父喜曰是子當以文行亢吾宗乎僧曇芳者師諸父行也欲乞師為嗣謝氏難之未幾師遘疾甚革謝氏禱於觀音大士頃之果愈遂從芳遊年十七摩切九流百氏之言已而棄之十九剃髮受具習律於武林靈芝寺會行丞相府飯僧師隨衆受供時中峯本禪師先已在座遙見師即呼曰汝日用如何師曰念佛峯曰佛今何在師擬議峯厲聲叱之師胡跪求法要峯授師以趙州無字話令參於是縛茅于靈隱山中倏忽十載歎曰平生志氣充塞乾坤今乃作甕裏醯雞耶復脅不著席者三年因往望亭聞鵲聲有省急往見中峯峯又斥之師憤然來歸夜將寂忽鼠食猫飯墮其器有聲恍然開悟披衣待旦復往質于中峯峯問曰趙州何故言無師曰鼠食猫飯峯曰未在師曰飯器破矣曰破後云何曰觸碎方甓峯乃微笑祝師曰汝宜善自護持栖遁巖穴時節若至其理自彰師既受付囑乃隱天龍之東菴後聲光日顯中竺欣公及行丞相脫歡請師出世師與弟子希升杖錫至伏龍山依大樹以居帝賜號佛慧圓鑑并賜金襴法衣至正丁酉六月示疾書偈曰平生饒舌今敗闕一句轟天正法眼滅投筆而逝塔全身于青松菴嗣法四人從前打睡忽然醒脫落年來舊話頭佛性有無趙州老青天白日沒來繇第二十五世蘇州府鄧尉聖恩寺萬峯時蔚禪師千巖嗣溫州樂清金氏子母鄭夢儒釋二人入其寢覺而生二子師居末適有光燭室鄭懼欲弗舉其姑保而育之襁褓中見僧輒微笑作合掌態父母度不可留使禮越之永慶寺講主升公出家時年十一入杭受具戒參止巖禪師於虎跑巖示以南泉三不是語因入達蓬山卓庵佛跡寺古趾晝夜參究至忘寢食一日聞寺主宗律師舉溈山踢倒淨瓶話忽契悟說偈曰顛顛倒倒是南泉纍我工夫却半年當下若能親薦得如何不進劈胸拳遂往見止巖會止巖圓寂師往掃塔忽聞僧房殿主舉千巖和尚頌有寄語諸方參學者莫教錯過好時光之句師即往伏龍謁千巖才入門巖便問將什麼與老僧相見師竪拳云者裏與和尚相見巖云死了燒了向何處安身立命師云漚生漚滅水還在風息波平月映潭巖命充第一座一日巖問不是心不是佛不是物是箇甚麼師將坐具打一圓相叉手而立復呈偈曰南泉不是惱人心有要將心去捉心不是我心不是佛性天空廓有何尋巖允之未幾復退潛隱千巖和尚招不赴乃以法衣頂相寄之後卓錫蘇州鄧尉山衲子奔集遂成叢林嗣法三人無風荷動有魚遊𨁝跳金鱗出一頭閃爍翻身恁麼去無賓主句一時收第二十六世寶藏普持禪師萬峯嗣住聖恩為二世萬峯禪師付法與師偈曰大愚肋下痛還拳三要三玄絶正偏臨濟窟中獅子子燈燈續𦦨古今傳嗣法六人哮吼一聲獅子出掀翻無限野狐窟大家裸裸赤條條箇箇堂堂明歷歷第二十七世東明虗白慧旵禪師寶藏嗣時年十四于丹陽妙覺寺禮湛然師剃髮受戒參雲間松隱叩其心印然未心肯自誓若不徹證不已因禪定六日出定舉首覩松豁然有省尋至松之玄墓聖恩寺見果林和尚針芥相投復指示見寶藏持禪師且陳悟因藏叱之曰佛法如大海轉入轉深那得泊在者裏師遂親炙座下藏一日問曰心不是佛智不是道汝云何會師向前問詢叉手而立藏呵曰汝在此許多時還作者箇見解師乃發憤忘寢食至第二夜驀然徹法源底遂呈偈曰一拳打破太虗空百億須彌不露踪借問箇中誰是主扶桑湧出一輪紅藏笑曰雖然如是也須善自護持時節既至其理自彰嗣法一人打破虗空活卓卓全身湧出絶承當廓然獨露無私旨天上人間沒處藏第二十八世湖州東明海舟普慈禪師蘇之常熟人姓錢世宗儒業出家於破山至慧日寺聽講楞嚴至但有言說都無實義處乃曰言說今日愈多矣遂歸日夜閲經尋思實義面顏日悴有居士問曰師顏色有病師云佛法不明故爾非病也士曰佛法不明何不往府中鄧尉山問取萬峯和尚去師聞之欣然便詣鄧尉見萬峯峯問曰沙彌何來師禮拜起曰常熟峯曰到此何為師舉前話再拜求示峯便劈頭兩棒攔背一踏以腳兩踢曰只者是實義師有省起曰好只好太費和尚心力峯笑而許之付以偈曰龜毛付囑與兒孫兔角拈來要問津一喝耳聾三日去箇中消息許誰親又曰子當匿跡護持莫輕為人師範師乃結菴於洞庭山塢草有九年一日僧至問曰當日有何所見遂隱於此就不再參人去師曰我昔日問萬峯但有言說都無實義峯便打自從此得悟僧曰請言得之所以師曰但要人知痛癢的是實義是妙心言說盡屬皮毛僧曰若據此見解生死尚未了何得言語不見道心不是佛智不是道耶師遂有疑即棄庵渡湖往安溪詣東明適有人設齊師至關前問明曰今日齊是什麼滋味明曰到口方知說即遠矣師曰如何是到口味明即打滅燈曰識得燈光何處著落味即到口師無語次日黎明遣侍者請師師至明問曰曾見人否師笑曰見只見一人說出恐驚人明曰假使親見釋迦依然是箇俗漢但說何妨師曰萬峯明曰萬峯即今在什麼處師面赤罔然明曰若如此不曾見萬峯師歸客寮三晝夜寢食俱忘偶值香燈繩斷墮地忽然大悟詣關前呈悟繇明曰老闍黎承嗣萬峯去師曰白公為我打徹何得承嗣萬峯明乃笑遂集衆出關升座曰瞿曇有意向誰傳迦葉無端開笑顏至此豈容七佛長文殊面赤也茫然今朝好笑東明事千古令人費唾涎幸得海公忘我我濟宗一脉續綿綿乃擲下拄杖下座師即入方丈禮謝明曰老僧不出月去也至草七夜辭衆草九日示寂師仍欲遁歸洞庭四衆苦留乃繼其席萬峯忌日師拈香指真曰我幾淹殺你甕裏幸是普慈若別人不可救也爇此瓣香堪酬接引喝一喝云只笑你護短沒頭師佛法當人情展坐具禮拜又拈香云此一瓣香供養東明長老一片赤心鞭䇿令余洞達宗源連喝兩喝受恩深處便為家有乳方知是阿娘禮拜起慟哭歸方丈臨示寂說偈曰九十六年於世七十四載為僧中間多少誵訛一見東明消殞以拂子打云釋迦至我六十二世有不可數老和尚又打云多向者裏安身咄乃投筆而逝在景泰元年全身塔于東明左側得法十二人驢事未去馬事到來分明鐵山崩倒壓銀山盤走珠兮珠走盤不得春風花不開花開又被風吹落所謂曾伴夜行驚惡虎幾回同上碧蘿峯第二十九世寶峯明瑄禪師海舟嗣姑蘇吳江人姓范氏在俗為木匠因海舟和尚造塔院斧傷自足痛甚索酒喫舟聞之往謂曰適來范作頭傷足猶可假若斫去頭千石酒與作頭喫作頭能喫否師有省即止酒遂求為僧舟即與披剃曰今日汝頭落地師曰頭雖落好喫酒人頭不落也乃充火頭一日師負薪舟見曰將荊棘作麼師曰是柴舟呵呵大笑師罔然舟曰是柴將去燒却師起疑曰和尚畢竟是甚麼道理故問我我不能答是夕刻意參究不覺被火燎去眉毛面如刀割以鏡照之豁然大悟呈悟於舟舟便打師奪拄杖云者條六尺竿幾年不用今日又要重拈舟大笑師呈偈曰棒頭著處血痕班笑裏藏刀仔細看若是英靈真漢子死人喫棒舞喃喃舟曰即此偈語可紹吾宗乃付偈曰臨濟兒孫是獅子一吼千山百獸死今朝汝具爪牙威也須萬壑深藏止從此名聞遐邇學者雲集得法五人逝於成化八年十二月九日全身塔于東明寺左嗣法一人將柴喚棘嘴都盧鐵汁灌他作醉壺骨髓皮毛皆換盡太阿舞得把龍屠第三十世天奇本瑞禪師寶峯嗣南昌鍾陵江氏子年二十隨父商于頴州偶厭世相遂信步至荊門禮無說能公披剃為沙門令看萬法歸一一歸何處話師乃遍參耆宿晝夜坐禪至隨州觀音寺聞進長老會中度夏見壁間有警䇿一篇師時持不語每擡頭惟看中間兩句曰沉吟是阿誰舉處是何人且看且參日久意深覺山河大地林木池沼六根六塵都來只是一箇誰字後與全首座往襄陽偶聞婦人喚猪聲全說偈曰阿娘墻內喚哪哪途路師僧會也麼拶破者些關棙子阿娘依舊是婆婆全舉了便行再不回顧師自念曰且不得直下承當便是乎行數程猶恍惚不已一日病中聞僧舉大慧禪師發背因緣豁然透得全公說偈之意乃作頌曰直下承當事不差皆因分別隔天涯若能返此回光照直下承當本不差因入蜀見楚山雪峯諸老漸有省發末後參寶峯和尚峯云甚麼處來師云北京峯云只在北京別有去處師云隨方瀟灑峯云曾到四川否云曾到峯云四川境界與此間如何云江山雖異風月一般峯竪起拳頭云還有這箇麼云無峯云因甚却無云非我境界峯云如何是你境界云諸佛不能識誰敢強安名峯云汝豈不是著空云終不向鬼窟裏作活計峯云西天九十六種外道你是第一師拂袖便出乃付偈曰濟山棒喝如輕觸殺活從茲手眼親聖解凡情俱坐斷曇花猶放一枝新嗣法二人隨機瀟灑大方出拶著當頭便返擲箇中境界阿誰知諸佛從來不能識第三十一世關子嶺無聞明聰禪師天奇嗣邵武光澤縣人也俗姓奚母吳氏將誕師前一夕有病僧告宿吳氏辭之夜半遂生師而病僧亦以是夕亡於道上里人咸謂此僧再來也師生三歲父母繼亡外祖憐而收養之未期年外祖亦死舅氏以師命孤苦乃送且隱菴為僧十七得度二十受具精毗尼兼修止觀深究唯識等論同學皆敬之一日遊百丈山逢一老宿問師曰大通智勝佛十劫坐道場佛法不現前不得成佛道此理如何師乃依文講之老宿詬罵而去師從此疑情頓發念念孜孜經五六載一日聞馬嘶豁然大悟乃曰如斯之事如來明見無有差謬遂參諸方得法于天奇老人焉奇問在世忘世是如何師云了物非物奇曰在念忘念是如何師云於心無心奇曰心佛俱忘是如何師云華山高㟮太行峨嗣法五人輕輕翻轉定盤星迷悟都來總不親赤子條條赤骨𩪸一雙隻手起家門第三十二世笑巖月心德寶禪師無聞嗣金臺吳氏子世族錦衣師幼孤情質近道弱冠時入寺聽講華嚴大疏至十地品如來為輪王時捨國城妻子頭目手足因感悟禮廣慧能禪師出家既落髮遍參名宿乃至伏牛火場淨土觀門無所不歷遂造關嶺謁無聞聰公問曰十聖三賢已全聖智為甚不明斯旨聰厲聲曰如何是斯旨速道速道師連下數轉語皆不契後因泉邊洗菜忽然一莖菜葉墮水師逐水圜轉捉之不可得遂有省喜躍來歸至晚聰以玄沙未徹語問之師曰賊入空房聰曰者則公案不得草草師便喝拂袖而出數日後辭關嶺與爽菴結伴入楚參大覺一日室中舉外道問佛不問有言不問無言世尊良久外道便悟覺曰既不涉有無良久亦是間名正當恁麼時外道悟箇甚麼師擬對覺以手掩師口曰止止猶更挂齒在師乃豁然曰可謂東土衲僧不若西天外道誠大遠在即呈偈曰自笑當年畫模則幾番紅了幾番黑如今謝主老還鄉那管平生得未得覺為助喜未幾覺順世師回關嶺聰禪師甚重之付以法印後與聰圍爐次聰云人人有本來父母子之父母今在何處師云一火焚之聰云恁麼則子無父母耶師云有即有佛眼不見聰云子還見麼師云某亦不見聰云為甚麼不見師云若見則非真父母遂呈偈曰本來真父母歷劫不曾離起坐承他力寒溫亦共知相逢不相見相見不相識為問今何在分明舉似師聰云堪紹吾宗嗣法三人伸手不及見非一火焚之絶無礙本來父母碎百嚼七縱八橫渾無罅第三十三世荊溪幻有正傳禪師笑巖嗣俗呂氏溧陽人也年十九剃髮于樂菴和尚因嬰勞疾菴令看父母未生前話久之無所契繇是克勤精進歷二七日餘一夕經行方坐昏沉無奈忽聞琉璃燈花熚𪹼聲豁然有省乃曰始知古人所謂直得虗空粉碎大地平沉十方無壁落四面亦無門若有一人發真歸源十方虗空悉皆消殞等說皆非虗語于是直造燕都參笑巖和尚求印可通所得未竟巖忽躍出隻履曰向者裏道一句看師無語乃通夕不寐至明旦猶立簷下巖出見喚之師回首巖翹一足作修羅障日月勢師有省服勤數載禮辭南歸巖書從上源流付之臨行贈以一笠曰無露圭角師初住龍池次遷五臺祕魔次北京普照晚歸龍池上堂舉文殊三處度夏話師曰文殊當時太殺神通迦葉奈何局于智短若作迦葉應把黃面老子先須擯却何也不見道來說是非者便是是非人上堂竪起拂子曰老僧今日借取這拂子一時說法直得三世諸佛立地聽汝等現前俱信得及麼倘信不及止止不須說我法妙難思題香爐偈曰有耳聞聲一似聾無容餘物動乎中灰心未必常如此嬴得清烟便不同師與士大夫遊嘗舉東坡點琴操語曰門前冷落車馬稀老大嫁作商人婦琴操何所感便削髮為尼耶士大夫多不契又慮學者見落斷常著書三篇曰駁語曰性住釋曰物不遷題旨刻行于世萬曆甲寅春仲示寂塔建本山與一源禪師同塔嗣法三人天童悟罄山修淨名蓮燈花報喜話偏長躍出鞋兒不覆藏勘破修羅障月勢爐中猛焰變空霜眼裏著得百千萬億須彌山耳裏著得不可思議大海水第三十四世明州天童密雲圓悟禪師龍池嗣宜興蔣氏子家貧樵採為業但于歲歲二三月中忽動世間無常之想便欲修行年二十七荷擔度山曲觸路旁積薪有省得管帶拘心意日用嘗令昭昭然越兩年棄室又明年從龍池山幻有傳禪師出家然覺生死到來畢竟不穩當二六時中看得心境兩立古人道天地同根萬物一體越看越成兩箇因舟次請益龍池池曰你若到者田地便放身倒臥師禮拜起昏蒙益甚嗣是惟加罵詈師慙悶交感至大病汗流二七日方愈遂掩關數載適傳公入都舉師監院事一日自城中歸過銅棺山頂忽覺情與無情煥然等現覓纖毫過患不可得大端說似人不得爾時昭昭靈靈底不知向甚處去了又自密密舉前所會古人因緣宛爾不同亦不自疑是與不是一日龍池喚師及覺宇入室曰老僧昨夜起來走一回把柄都在手裏了汝等為我扶持佛法師便出呈偈曰若據某甲扶佛法任他都來總與三十棒莫道分明為賞罰龍池目之大笑師接來付火未幾池示寂師依塔三載萬曆丁巳衆請繼席開法次住通玄金粟黃檗育王天童凡六巨剎宗風大振上堂禪不在參道不在悟直下了然超佛越祖驀拈拄杖曰即今莫有超佛超祖者麼卓拄杖曰正好朝打三千暮打八百擲拄杖曰為什麼如此撫掌曰這裏放過則不可上堂本來無物可評論未悟之人妄見分忽若迸開頂𩕳眼大地山河一口吞上堂樹雕葉落明明脫體全彰雲散天空杲杲日輪當午正恁麼時霜風劈面來諸人還覺寒毛卓竪也無若也覺得如龍得水似虎靠山日用頭頭全體露折旋俯仰沒遮攔喝一喝上堂子規啼血滿花枝口口聲聲祇呌歸不耐時人猶不省年年三月又來啼大衆還委麼自是不歸歸便得五湖烟景有誰爭卓拄杖一下上堂太白山中儘有柴一株不許衆人搬老僧不是多護惜為要諸人徹骨寒雖然如是只如道三界無安猶如火宅諸人又向甚麼處回避若也回避得可以高超三界獨步大方其或未然各各照顧眉鬚始得崇禎辛巳國戚田公為皇貴妃齎紫衣入山請師演法復得俞旨住金陵大報恩寺師以衰邁遜謝明年春拂衣上通玄秋七月三日示微疾七日午時奄然坐化流光夜照四山變白壽七十有七迎全身歸塔于天童幻智庵右隴嗣法一十二人五峯學鄧尉藏破山明徑山容金粟乘寶峯忍龍池微天童忞雪竇雲古南門報恩賢天童奇杖頭發起焰紅火佛祖皺眉無處躲大地山河盡化灰殺人不用磨刀斧喧天動地老和尚徹骨徹髓一條棒終始不開第二門天上人間作榜樣中興臨濟之道萬古法門標格真一代開闢大宗師第三十五世徑山費隱通容禪師密雲嗣閩之福清何氏子十四依鎮東慧山祝髮初參壽昌博山及雲門皆不能了手有偈見志云吾年二十五氣海吞佛祖不過古人關豈踏今時路後聞密雲和尚過越寓吼山遂謁便問覿面相提事若何雲以番菩提珠便打師云錯雲又打師便喝雲祇管打師祇管喝至第七打頭顱幾裂所有伎倆知見一切氷釋一日雲問薰風自南來殿閣生微涼汝作麼生會師云水向石邊流出冷風從花裏過來香雲云離了此又作麼生師云放和尚三十棒雲云除却棒又作麼生師便喝雲云喝後聻師云更要重說偈言雲便休去既而雲主金粟命職西堂明年隨赴黃檗雲升座以源流衣拂付焉拄杖橫肩挑日月拳頭劈面打人天上堂全身擔荷赤體提持要是夙有器骨英靈漢子於尋嘗日用活卓卓地不將奇特言句貼于額頭玄妙理致蘊于底裏專用格外鉗鎚獨奮宗門牙爪生擒猛虎活捉獰龍縱有言超佛祖行過舍那入此閫域未免橫身拶出其餘之輩觀心作念著意思惟塵寂光生而有神頴妙慧自作去就畢竟搆他語脈不上要有者等丁卓始可別行教外單傳直指主持棒喝全行正令而與從上瞎驢蹄角相肖上堂句要分明意須不錯不錯分明灑灑落落隨處降雨騰雲不比禿墮在壁角所以垂鉤四海只釣獰龍格外玄機為尋知己順治庚寅年師受杭州府餘杭縣暨守鎮及諸鄉紳合山禪德等共請住徑山興聖萬壽禪寺上堂云高提祖印須藉名藍流通正眼要有人歸此山為江南首剎天下人聞莫不仰止蓋有五峯插天萬松覆屋兩徑走天衢三門鎖龍澤況有八十餘代祖師於此建大法壇弘無上道宗風振遐邇光明照古今龍章聿降鳳詔頻臻代不乏人珠聯璧合赫赫然祖室傳燈峩峩爾山藏龍象盛哉當年壯麗可觀山僧今日到此主席大似鼠尾續貂如何得相似去遂以拂子作圓相云拾得者顆明珠特特持來要與列代祖師等閒一賽蓋佛佛道同祖祖不異且道此珠與歷代祖師是同是異若道是同古今相隔作麼生說箇同若道是異佛佛道一作麼生說箇異舉揚到此大似機輪轉處難為回互直得八字打開縱橫無礙閒將三句權接人天四喝頻施敲磕龍象料揀將來驅耕夫之牛奪饑人之食照用同時掀翻海嶽別覓知音拋出家具賓主相看更喚三玄三要為破沙盆追回臨濟家風捩轉列祖鼻孔尊宿當年如寶集無窮三昧潑空流復舉當時僧問開山國一欽禪師云如何是道國一欽答云山上有鯉魚海底有蓬塵據國一欽恁麼答話雖則道出常情機通格外簡點將來也是板齒生毛忽有人問山僧如何是道但答云兩徑盤旋上翠微據此與國一欽相去多少只如今日最初上堂祝贊一句意旨如何喬木山中無盡數檀那福壽倍於斯寬兮宇宙誠然小窄也絲毫實不存師自黃檗暨至天童鉗鎚衲子寒暑弗懈每見諸方言行有乖法門者不避怨憎直筆救正著書十二卷顏曰別集與語録並行于世嗣法門人隱元琦朗真璣亘信彌百癡元玄密定三笑密孤雲鑑古淵成本充盛柴立己空嵓坦蒼霞桴斷眉敏課虗真韜明宗又度舟天水廣雲浪全尚綬權靈機觀靈嶽古正法宏頴正端太白雪離言法千峯立居士王谷嚴大參嚴栻徐昌治百萬雄軍入漢關威風凜凜震天寒單刀直取顏良首正令全提有甚難未常說妙談玄問著不棒便拳到處建幢立剎方顯臨濟真傳豫昌治法名通昌號覲周別號無依道人鹽官人也生最晚父母甚憐愛幼習儒蚤補博士弟子以副榜貢入都道經山東凑兄從治巡撫彼省被圍萊城時援萊者泄泄且掩敗為功豫據實具疏上聞得俞旨旋擕兄家眷南還見髦父嘆世情冷淡不樂發憤攻苦獲登賢書以慰親心到處叢林皆擁護而捨田輸粟竭力傾心獨金粟為最一日因聽講楞嚴經薦得瞿老放捨外六塵內六根中六識捨却無可捨處是放身命處當下心意豁然遂棄公車猛圖佛乘分家脫俗一切撇下正如獨坐虗空四方無壁落蓮生火裏擔柴帶月歸者灑灑落落笑傲自繇適隨費老人入徑山喜而付杖銘曰覿體現前描畫不得妙運超方了無羣惑指點人間疏通正脉又書偈曰立地頂天一丈夫儒宗釋典旨相符年來體道深深喜肯把瞿曇擔子扶偶佩誦嫡傳一帙老人復諭曰源流正派拈頌者多汝試品題可稱獨步或自出手眼或採訪古錐或集收諸宿使觸目會心有所裨益豈不美乎豫遵行刊布所謂垂絲千尺意在深潭急須著眼看仙人莫看仙人手中扇是則豫殷殷致望於得魚忘筌者本師費隱禪師寄贈備閲傳序履歷如飲甘飴且具正知見以弘護大法真末世中東南光明幢照耀剎海何幸如之喜不自禁又云居士昔著儒書今宣佛旨實係靈山會上發願而來非同等閒也金粟百癡禪師跋語佛祖來源機語諸方鋟出流行者浩繁不可勝計然未有如覲翁之簡切著明者也覲翁以富貴之身行俗之事瀝膽輸肝為法門大城塹忽有所得遂將自己手眼與這一隊老古錐面目經輕點出使天下人共見共知其用意可謂勤且至矣豫披閲再三擊節稱善諸人若弗信請向此録中著一隻眼便知覲翁立地處且如何是覲翁立地處還委悉麼解用不須霜刃劒延齡奚必九還丹附刻本師費老人付法語偈覲周徐居士護持老僧弘揚祖道自金粟至天童自天童至福嚴自福嚴至徑山將二十年心不異緣猶如一日每常叩問其己躬下事大似坐在大海中有問海水如何明知無非是水雖不答而答若答猶有非水者在蓋生平于孔孟及我教乘理致大同之旨淹貫甚熟不脫其極則之理大段然耳茲到維摩相看老僧略敘寒溫于次早喫粥時老僧啓云欲操宗門一事須是契理契機理則理致機則機用如古人云不是心不是佛不是物畢竟是箇甚麼居士答云是無位真人老僧云如何是無位真人居士答云喫粥底不是那少頃老僧又問云如何是祖師西來意居士驀顧如意云者箇是如意老僧又問不喚作如意又作麼生居士擬議老僧急索云何不問我居士云不喚作如意又作麼生老僧遂拍桌一下居士即唯唯點首然居士秉性天生厚重凡所作不涉枝蔓如此對機數語言簡理盡悉知其造詣之大槩也所謂供佛不在香多良有以焉遂以一偈并如意一握囑以表信更期從此以去日用之間騰騰任運任運騰騰以正法眼照了千差萬別與諸方禪老交際語脉須斬釘截鐵才是拋栗棘蓬擲金剛圈續佛慧命之大任也偈云二十年來護法道今朝放下樂天真指揮向上關頭事照用應須手眼親昌治和韻呈偈昔年贈我無依號而今信我樂天真案前一拍須彌碎萬法齊收日用親
