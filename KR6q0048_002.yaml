body:
  text: 武原居士徐昌治覲周父編述第一世南嶽懷讓禪師六祖嗣金州杜氏子唐儀鳳二年四月八日降生有白氣上屬天太史奏之高宗宗問是何祥乎對曰國之法器不染世榮宗傳敕金州太守韓偕親往存慰年十歲惟樂佛書有玄靜三藏告師父母曰此子若出家必獲上乘廣廣衆生至垂拱三年年十五依荊州玉泉寺弘景律師出家通天二年受戒習毗尼藏一日歎曰夫出家者當為無為法天上人間無有勝者遇同學坦然相與謁嵩山安公安令詣曹溪見六祖得法侍祖復十五年先天二年往衡嶽居般若寺開元中有沙門道一在衡嶽常習坐禪師知是法器往問曰大德坐禪圖甚麼一曰圖作佛師乃取一磚於彼菴前石上磨一曰磨作甚麼師曰磨作鏡一曰磨磚豈得成鏡耶師曰磨磚既不成鏡坐禪豈得作佛曰如何即是師曰如牛駕車車若不行打牛即是打車即是一無對師又曰汝學坐禪為學坐佛若學坐禪禪非坐臥若學坐佛佛非定相於無住法不應取捨汝若坐佛即是殺佛若執坐相非達其理一聞示誨如飲醍醐禮拜問曰如何用心即合無相三昧師曰汝學心地法門如下種子我說法要譬彼天澤汝緣合故當見其道又問道非色相云何能見師曰心地法眼能見乎道無相三昧亦復然矣一曰有成壞否師曰若以成壞聚散而見道者非見道也聽吾偈曰心地含諸種遇澤悉皆萌三昧華無相何壞復何成一蒙開悟心意超然侍奉九秋日益玄奧遂得法既是無相三昧嗔甚麼作車喚甚作牛總是金鞭裏橫馳驟踢碎車輪踏殺牛僧問如鏡鑄像像成後未審光向甚麼處去師曰如大德為童子時相貌何在曰祇如像成後為甚麼不鑑照師曰雖然不鑑照謾他一點不得後馬大師闡化于江西師問衆曰道一為衆說法否衆曰已為衆說法師曰總未見人持箇消息來衆無對因遣一僧去囑曰待伊上堂時但問作麼生伊道底言語記將來僧去一如師旨回謂師曰馬祖云自從胡亂後三十年不曾少鹽醬師然之入室弟子六人師各印可得正脉者馬祖一人而已師于天寶三年八月十一日圓寂塔于衡嶽諡大慧第二世江西道一禪師南嶽嗣漢州什邡縣人姓馬氏稱馬大師容貌奇異牛行虎視引舌過鼻足下有二輪文幼歲于本邑羅漢寺出家受具于渝州圓律師開元中習定于衡州讓和尚發明大事受法始自建陽佛跡嶺遷臨川次南康龔公山大曆中隸名鍾陵開元寺四方學者雲集鄧隱峯辭師至石頭去師曰石頭路滑峯曰竿木隨身逢場作戲去見石頭即繞禪牀一匝振錫一聲問是何宗旨石頭曰蒼天蒼天峯無語却回師一日謂衆曰汝等諸人各信自心是佛此心即是佛心達磨大師從南天竺國來至中華傳上乘一心之法令汝等開悟又引楞伽經文以印衆生心地恐汝顛倒不自信此一心之法各各自有之故楞伽經以佛語心為宗無門為法門夫求法者應無所求心外無別佛佛外無別心不取善不捨惡淨穢兩邊俱不依怙故三界惟心森羅萬象一法之所印凡所見色皆是見心心不自心因色故有汝但隨言說即事即理都無所礙菩提道果亦復如是於心所生即名為色知色空故生即不生若了此色乃可隨時著衣喫飯長養聖胎任運過時更有何事汝受吾教聽吾偈言心地隨時說菩提亦祇寧事理俱無礙當生即不生即心即佛頭上安頭非心非佛無繩自縛不是心不是佛不是物泥裏洗土塊就師答僧問三種語看來末後且教體會大道何等覿面相呈一夕西堂百丈南泉隨侍玩月次師問正甚麼時如何堂曰正好供養丈曰正好修行泉拂袖便行師曰經入藏禪歸海惟有普願獨超物外兩三嘲弄風月馬師亂札塗污要與明月清風增光須具眼勘破師問百丈汝以何法示人丈竪起拂子師曰祇這箇為當別有丈拋下拂子有水皆含月無山不帶雲僧問離四句絶百非請師直指西來意師曰我今日勞倦不能為汝說問取智藏去僧問西堂堂云何不問和尚僧云和尚教來問堂云我今日頭痛不能為汝說問取海兄去僧又問百丈丈云我者裏却不會僧却回舉似師曰藏頭白海頭黑這僧問頭太嶮峻幾令馬師父子出身無路還喜髑髏前著著中箭三箇不答總是拍盲地將古人醍醐上味著毒藥在裏許所以馬祖道待汝一口吸盡西江水即向汝道與此公案一般若會得藏頭白海頭黑更會西江水話這僧將一擔懵憧換得箇不安樂更勞他三尊宿入泥入水畢竟這僧不瞥地雖然恁麼這三個宗師却被擔板漢勘破如今只管向語言上作活計云白是明頭合黑是暗頭合只管鑽研計較殊不知古人一句截斷色根須是正脉裏自看始得穩當所以道末後一句始到牢關把斷要津不通凡聖師于貞元四年正月中登建昌石門山于林中經行見洞壑平坦謂侍者曰吾之朽質當于來月歸茲地矣及歸遂示疾院主問和尚近日尊體如何師曰日面佛月面佛日面月面晝夜常現孰信盲人却自能現正是爍破臉皮渾是骨一箭清光射入屋龐居士問不昧本來人請師高著眼師直下士曰一等沒弦琴惟師彈得妙師直上士禮拜師歸方丈士隨後曰適來弄巧成拙且道是賓家弄巧成拙主家弄巧成拙上下怎顯本來人居士禮拜囫圇吞箇棗入室弟子一百三十九人坐道場者八十四員龐蘊居士在內元和中諡大寂禪師塔曰大莊嚴應讖而出一磚打醒縱橫蹴踏機用最神第三世洪州百丈山懷海禪師馬祖嗣福州長樂王氏子兒時隨母入寺拜佛指佛像問母曰此為誰母曰佛也師曰形容與人無異我後亦當作佛丱歲離塵三學該練參馬大師為侍者檀越每送齊飯來師才揭開盤蓋馬大師便拈起一片胡餅示衆云是甚麼每每如此經三年一日侍馬祖行次見一羣野鴨飛過祖曰是甚麼師曰野鴨子祖曰甚處去也師曰飛過去也祖遂把師鼻扭負痛失聲祖曰又道飛過去也師于言下有省却歸侍者寮哀哀大哭同事問曰汝憶父母耶師曰無曰被人罵耶師曰無曰哭作甚麼師曰我鼻孔被大師扭得痛不徹同事曰有甚因緣不契師曰汝問取和尚去同事問大師曰海侍者有何因緣不契在寮中哭告和尚為某甲說大師曰是伊會也汝自問取他同事歸寮曰和尚道汝會也教我自問汝師乃呵呵大笑同事曰適來哭如今為甚却笑師曰適來哭如今笑同事罔然野鴨子知何許馬祖見來相共語話盡雲山水月情依然不會還飛去次日馬祖升座衆才集師出卷却席祖便下座師隨至方丈祖曰我適來未曾說話汝為甚便卷却席師曰昨日被和尚扭得鼻頭痛祖曰汝昨日向甚處留心師曰鼻頭今日又不痛也祖曰汝深明昨日事師作禮而退馬師升堂百丈捲席分明一貫兩箇五百師再參侍立次祖自視繩牀角拂子師曰即此用離此用祖曰汝向後開兩片皮將何為人師取拂子竪起祖曰即此用離此用師掛拂子于舊處祖震威一喝師直得三日耳聾一聲塗毒聞皆喪遍地髑髏無處藏三寸舌伸安國劒千秋凜凜白如霜客情步步隨人轉有大威光不能現突然一喝雙耳聾那吒眼開黃檗面從前汗馬無人識祗要重論蓋代功未幾住大雄山以所處岩巒峻極故號百丈四方學者至一日謂衆曰佛法不是小事老僧昔被馬大師一喝直得三日耳聾黃檗聞舉不覺吐舌師曰子已後莫承嗣馬祖去麼檗曰不然今日因和尚舉得見馬祖大機之用然且不識馬祖若嗣馬祖已後喪我兒孫師曰如是如是見與師齊減師半德見過于師方堪傳授子甚有超師之見檗便禮拜黃檗因百丈舉馬祖一喝明機終嗣百丈而不嗣馬祖以親承面稟故也真萬古師承之法可見耳聾不在一喝處吐舌不在耳聾處馬祖捉生蠶做繭百丈牽死牛穿鼻昨日今朝箇裏事智如鶖子不能知如今人誤認見過於師每以涉略自矜指天畫地呵父罵祖笑殺傍觀住後馬師送三甕醬至師集衆上堂開了拈拄杖指甕曰道得即不打破道不得即打衆無語師打破歸方丈師每上堂有一老人隨衆聽法一日衆退惟老人不去師問汝是何人老人曰某非人也于過去迦葉佛時曾住此山因學人問大修行人還落因果也無某對云不落因果遂五百生墮野狐身今請和尚代一轉語貴脫野狐身師曰汝問老人曰大修行人還落因果也無師曰不昧因果老人于言下大悟作禮曰某已脫野狐身住在山後敢乞依亡僧津送師令維那白椎告衆食後送亡僧大衆聚議一衆皆安涅槃堂又無病人何故如此食後師領衆至山後岩下以杖挑出一死野狐乃依法火葬不落與不昧半明兼半晦不昧與不落兩頭空索索座中既有江南客休向樽前唱鷓鴣一僧云不昧因果也未脫得野狐身一僧云不落因果又何曾墮野狐來雪峯聞之聳然因為偈曰不落不昧僧俗本無忌諱丈夫氣宇如王爭受囊藏被蓋一條楖𣗖任縱橫金毛跳入野狐隊師至晚上堂舉前因緣黃檗便問古人錯祇對一轉語墮五百生野狐身轉轉不錯合作箇甚麼師曰近前來向汝道檗近前打師一掌師笑曰將謂胡鬚赤更有赤鬚胡此得意忘言手舞足蹈機括今人便認作打會師有時說法竟大衆下堂乃召之大衆回首師曰是甚麼溈山五峯雲巖侍立次師問溈山屏却咽喉唇吻作麼生道山曰却請和尚道師曰不辭向汝道恐已後喪我兒孫上堂云靈光獨耀逈脫根塵體露真常不拘文字心性無染本自圓成但離妄緣即如如佛人人本具個個圓成會也草披春色不會月瀉秋清弗用求真息見那許帶月忘形僧問如何得自繇分師曰如今即得或對五欲八風情無取捨慳嫉貪愛我所情盡垢淨俱忘如日月在空不緣而照心心如木石念念如救頭然亦如香象渡河截流而過更無疑滯此人天堂地獄所不能攝也夫讀經看教語言皆須宛轉歸就自己但是一切言祇明如今鑒覺自性但不被一切有無諸境轉是汝導師能照破一切無有諸境是金剛慧即有自由獨立分夜半忽然忘月指虗空迸出日頭紅師凡作務執勞必先于衆主者不忍密收作具而請息之師曰吾無德爭合勞于人既遍求作具不獲則亦不食故有一日不作一日不食之語流播諸方唐元和九年正月十七歸寂諡大智塔曰大寶勝輪嗣法一十五人竪去橫來無別事巍巍獨坐大雄山等閒撥轉野狐調引出鬚鬍入漢關第四世洪州黃檗希運禪師百丈嗣閩人也幼於本州黃檗山出家額間隆起如珠音辭朗潤志意冲淡至洛京行乞吟添鉢聲有一嫗出棘扉間曰太無厭生師曰汝猶未施責我無厭何耶嫗笑而掩扉師異之進而與語多所發藥師須臾辭出嫗告之曰可往南昌見馬大師至南昌馬大師已示寂遂往石門謁塔時百丈禪師廬于塔傍乃往參丈丈問巍巍堂堂從何方來師曰巍巍堂堂從嶺南來丈曰巍巍堂堂當為何事師曰巍巍堂堂不為別事便禮拜問曰從上宗乘如何指示丈良久師曰不可教後人斷絶去也丈曰將謂汝是個人乃起入方丈師隨後入曰某甲特來丈曰若爾則他後不得辜負吾丈一日舉再參馬祖被喝話師遂領旨拾得紅爐一點雪却是黃河六月氷丈一日問師甚麼處去來曰大雄山下采菌子來丈曰還見大蟲麼師便作虎聲丈拈斧作斫勢師即打丈一摑丈吟吟而笑便歸上堂曰大雄山下有一大蟲汝等諸人也須好看百丈老漢今日親遭一口一日上堂大衆雲集乃曰汝等諸人欲何所求以拄杖趂之大衆不散師却復坐曰汝等諸人盡是噇酒糟漢恁麼行腳取笑于人但見八百一千人處便去不可圖他熱閙也老漢行腳時或遇草根下有一箇漢便從頂門上一錐看他若知痛癢可以布袋盛米供養他可中總似汝如此容易何處更有今日事也汝等既稱行腳亦須著些精神好還知道大唐國裏無禪師麼時有僧問諸方尊宿盡聚衆開化為甚麼却道無禪師師曰不道無禪祇是無師身上著衣方免寒口邊說食終不飽大唐國裏老婆禪今日為君注破了黃檗山中明示衆大唐國裏暗藏身袈裟一角猶拖地誰是叢林有眼人無師充塞大唐國噇酒糟漢會不得竹寺閒過春已深落花亂點莓苔色師辭南泉泉門送提起師笠曰長老身材沒量大笠子太小生師曰雖然如此大千世界總在裏許泉曰王老師聻師戴笠便行嗣法六人第五世鎮州臨濟義玄禪師黃檗嗣曹州南華邢氏子幼負出塵之志及落髮受具便慕禪宗初在黃檗會中行業純一時睦州為第一座乃問上座在此多少時師曰三年州曰曾參問否師曰不曾參問不知問箇甚麼州曰何不問堂頭和尚如何是佛法的的大意師便去問聲未絶檗便打師下來州曰問話作麼生師曰某甲問聲未絶和尚便打某甲不會州曰便更去問師又問檗又打如是三度問三度被打師白州曰早承激勸問法纍蒙和尚賜棒自恨障緣不領深旨今且辭去州曰汝若去須辭和尚了去師禮拜退州先到黃檗處曰問話上座雖是後生却甚奇特若來辭方便接伊已後為一株大樹蔭覆天下人去在師來日辭黃檗檗曰不須他去只往高安灘頭參大愚必為汝說師到大愚愚曰甚處來師曰黃檗來愚曰黃檗有何言句師曰某甲三度問佛法的的大意三度被打不知某甲有過無過愚曰黃檗與麼老婆心切為汝得徹困更來這裏問有過無過師于言下大悟乃曰元來黃檗佛法無多子愚搊住曰者尿牀鬼子適來道有過無過如今却道黃檗佛法無多子你見箇甚麼道理速道速道師於大愚肋下築三拳愚拓開曰汝師黃檗非干我事師辭大愚却回黃檗檗見便問者漢來來去去有甚了期師曰只為老婆心切便人事了侍立檗問甚處去來師曰昨蒙和尚慈旨令參大愚去來檗曰大愚有何言句師舉前話檗曰大愚老漢饒舌待來痛與一頓師曰說甚待來即今便打隨後便掌檗曰者風顛漢來者裏捋虎鬚師便喝檗喚侍者曰引者風顛漢參堂去連打三番不展眸更饒一撥始昂頭築拳鼓掌威獰甚虎尾虎頭通併收今之開堂者見別堂僧來招攬惟恐不及正于閙熱攘奪時冷眼看大愚行徑真千古宗師師後住鎮州臨濟學侶雲集一日謂普化克符二上座曰我欲于此建立黃檗宗旨汝且成褫我二人珍重下去三日後普化却上來問和尚三日前說甚麼師便打三日後克符上來問和尚前日打普化作甚麼師亦打祖令全提繼後宗示徒端不在從容棒頭擊起隈岩虎霹靂轟騰臥海龍至晚小參曰有時奪人不奪境有時奪境不奪人有時人境俱奪有時人境俱不奪克符問如何是奪人不奪境師曰煦日發生鋪地錦嬰兒垂髮白如絲符曰如何是奪境不奪人師曰王令已行天下遍將軍塞外絶烟塵符曰如何是人境俱奪師曰并汾絶信獨處一方符曰如何是人境俱不奪師曰王登寶殿野老謳歌符于言下領旨奪人不奪境三竿曉日千門靜奪境不奪人玉鞭金鐙賞殘春人境兩俱奪漠漠長蛇圍偃月人境俱不奪上下四維春似潑僧問如何是真佛真法真道乞師開示師曰佛者心清淨是法者心光明是道者處處無礙淨光是三即一皆是空名而無實有如真正作道人念念心不間斷自達磨大師從西土來祗是覓箇不受人惑的人後遇二祖一言便了始知從前虗用工夫山僧今日見處與佛祖不別若第一句中薦得堪與祖佛為師若第二句中薦得堪與人天為師若第三句中薦得自救不了僧便問如何是第一句師曰三要印開朱點窄未容擬議主賓分曰如何是第二句師曰妙解豈容無著問漚和爭負截流機曰如何是第三句師曰但看棚頭弄傀儡抽牽全藉裏頭人棒喝交馳總不親即非親處孰為真寧同生也莫同死直下休教錯認人乃曰大凡演唱宗乘一句中須具三玄門一玄中須具三要有權有實有照有用汝等諸人作麼生會下座第一玄古井茫茫把雪填第二玄未曾開口在言前第三玄胡孫心肝樹上懸第一要了無奇特并玄妙第二要門外讀書人來報第三要蟭螟眼裏山河繞師應機多用喝會下參徒亦學師喝師曰汝輩總學我喝我今問汝有一人從東堂出一人從西堂出兩人齊喝一聲者裏分得賓主麼汝且作麼生分若分不得已後不得學老僧喝一喝如金剛寶劍劈面揮時難嚲閃一喝如踞地獅子古冢野狐逢即死一喝如探竿影草玉門關透長安道一喝不作一喝用十月黃河連底凍據令聲前我獨雄橫驅萬里疾雷風始知無限賞心處鎮國傳家在此中上堂次兩堂首座相見同時下喝僧問師還有賓主也無師曰賓主歷然師召衆曰要會臨濟賓主句問取堂中二首座一條拄杖兩人扶試問諸人會也無滿目堂堂通是漢幾個男兒是丈夫示衆參學之人大須子細如賓主相見便有言論往來或應物現形或全體作用或把機權喜怒或現半身或乘獅子或乘象王如有真正學人便喝先拈出一箇膠盆子善知識不辨是境便上他境上作模作樣便被學人又喝前人不肯放下此是膏肓之病不堪醫治喚作賓看主或是善知識不拈出物祇隨學人問處即奪學人被奪抵死不肯放此是主看賓或有學人應一箇清淨境出善知識前知識辨得是境把得拋向坑裏學人言大好善知識知識即云咄哉不識好惡學人便禮拜此喚作主看主或有學人披枷帶鎖出善知識前知識更與安一重枷鎖學人歡喜彼此不辨喚作賓看賓大德山僧所舉皆是辨魔揀異知其邪正賓中賓魚目將為無價珍賓中主到家猶自喃喃語主中賓唱歌還是帝鄉人主中主大用現前沒規矩夫分賓主如並存照用如別立君臣如縱故曰一句分賓主照用一時行要會箇中意日午打三更又曰賓主穆時全是妄君臣合處正中邪還鄉曲調如何唱明月堂前枯樹花三玄三要事難分得意忘言道最親一句明明該萬象重陽九日菊花新咦識三玄三要句請看金色笑拈花窺