front:
  text: 自序自六佛出世相傳說法度人而不傳所說迨釋迦佛於靈山會上說四十九年法卒云未甞說一字可見說原不說也特以不立文字教外別傳付囑摩訶迦葉且告曰吾以正法眼藏密付于汝汝當護持并敕阿難副二傳化無令斷絕付偈付衣從此而始在天竺國遞遞相傳二十八祖幸達磨怜念震旦依佛授記運光於彼遂囑弟子不若密多羅住天竺傳法而躳泛重溟且三周寒暑始達南海與梁武不契復住少林得遇神光真正踰海越漠為法求人際會未諧如愚若訥者究竟慧可安心僧璨懺罪了無異轍所謂至道無難惟嫌揀擇是也四祖遲遲以待五祖再世受法俱非偶然至盧道人樵採鬻薪之下便曉諸佛妙理非關文字視學通內外之神秀何啻三舍避之而卒傳其道者槽廠獦獠人也南宗北宗又從此始嗣六祖者南嶽青原嶽出馬祖祖出臨濟溈仰雲門法眼派雖有四而臨濟為正傳原出石頭頭出曹洞一花五葉又從此始論佛法機緣臨濟可謂闡發殆盡亦不過稟承少室覓箇不受人惑的人興化薦得濟師于黃檗處喫棒底道理而拈香有專主風穴問答俱化首山會處不在法華汾陽化處不在停箸皆無始來時面目全也慈明徐整敝衣不負西河獅子楊岐知是般事白雲悟了遇人信哉他人住處我不住他人行處我不行也浮山接引五祖依白雲何至公無我我若是佛果透頂透底剪斷葛藤虎丘想酢生液聲振瞌睡應菴通楊岐正脈密菴喚法眼作沙盆無準受破菴開示不捉胡孫高峯枕子聲中峯竹篦子此意拈向處箇箇脫言詮或覩松豁然或燈花落處或火燎眉毛或水墮莖菜或無露圭角俱謾他一點不得至于樵採為業觸積薪而省與六祖若出一轍而一條白棒中興臨濟宗風密老人真千古一人焉費隱禪師處今日更難矣非不抱遠公虗懷大愚汪度而世之攘奪如故非不景行海舟之自得師存獎之認薦主而世之奔競如故至于尊祖敬宗有稟承而無我慢大孝至友隆水木而敦同氣乃世之澆漓又如故然而直心直行至公無私密老人稱之人亦能諒之歷住名剎新堂搆以紹前徽併後躅聽之將來昔孔子知我罪我惟春秋孟子謂功不在禹下余謂費師之功不在孔孟下是同是別總之昧却佛乘迷却師承故展轉支離今急編嫡傳一帙細為剖白孰頭可斷而法不可貶孰身可化而道不可輕孰虗己讓賢孰師資道契孰心心相印孰鉢鉢相承臚列古方為俗耳針砭佛腸鼓吹名曰指南余敢曰不藉眾長於尊宿亦豈敢曰遂昭月旦於千秋庶幾以一滴獅子乳迸散十斛驢乳不無小補也伏願開椷者目擊道存思人人本具箇箇圓成上追七佛諸祖芳躅何以獨隆于𨓏古下考六祖暨三十五世大宗師何以美于百可見僧佛非有二乘承不相襲但力杜邪知邪見返炤迴光便透脫分曉所謂白雲迷却舊行踪臘月燒山火正紅再得慈風來扇發冷氷氷處煖烘烘葢開眼見明合眼見暗不開不合堂堂顯露過去未來不隔一線既將眼看又心看乃見重敲火裏氷噫晴霄月曬梅花冷霜夜霜敲木葉疏我憑此道勉知己漸使清風廓九垓旹壬辰秋季登高日徐昌治覲周父題大業堂中祖庭嫡傳指南目錄卷上七佛毗婆尸佛尸棄佛毗舍浮佛拘留孫佛拘那含牟尼佛迦葉佛釋迦牟尼佛西天祖師一祖摩訶迦葉尊者二祖阿難尊者三祖商那和修尊者四祖優波毱多尊者五祖提多迦尊者六祖彌迦尊者七祖婆須密尊者八祖佛陀難提尊者九祖伏䭾密多尊者十祖脇尊者十一祖富那夜奢尊者十二祖馬鳴大士尊者十三祖迦毗摩羅尊者十四祖龍樹尊者十五祖迦那提婆尊者十六祖羅睺羅多尊者十七祖僧伽難提尊者十八祖伽耶舍多尊者十九祖鳩摩羅多尊者二十祖闍夜多尊者二十一祖婆修盤頭尊者二十二祖摩拏羅尊者二十三祖鶴勒那尊者二十四祖師子比丘尊者二十五祖婆舍斯多尊者二十六祖不如密多尊者二十七祖般若多羅尊者二十八祖菩提達磨尊者東土祖師達磨東來六世而有曹溪曹溪而後分為兩支其一南嶽懷讓出馬祖一一出百丈海天王悟海出溈山祐黃檗運祐出仰山寂是溈仰宗運出臨濟玄是臨濟宗悟出龍潭信傳至雲門偃是雲門宗法眼益是法眼宗其一青原思思傳石頭遷天皇悟悟絕遷傳至洞山价价傳雲居膺是曹洞宗初祖達磨大師二祖慧可大師三祖僧璨大士四祖道信大師五祖弘忍大師六祖慧能大師卷下一世南嶽讓禪師二世馬祖一禪師三世百丈海禪師四世黃檗運禪師五世臨濟玄禪師開山祖師六世興化獎禪師七世南院顒禪師八世風穴沼禪師九世首山念禪師十世汾陽昭禪師十一世石霜圓禪師十二世楊岐會禪師十三世白雲端禪師十四世五祖演禪師十五世圜悟勤禪師十六世虎丘隆禪師十七世應菴華禪師十八世密菴傑禪師十九世破菴先禪師二十世無準範禪師二十一世雪巖欽禪師二十二世高峯妙禪師二十三世中峯本禪師二十四世千巖長禪師二十五世萬峯蔚禪師二十六世寶藏持禪師二十七世東明旵禪師二十八世海舟慈禪師二十九世寶峯喧禪師三十世天奇瑞禪師三十一世無聞聰禪師三十二世笑巖寶禪師三十三世幻有傳禪師三十四世密雲悟禪師三十五世費隱容禪師
