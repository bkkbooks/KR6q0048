body:
  text: 武原居士徐昌治覲周編述七佛毗婆尸佛過去莊嚴劫第九百九十八尊偈曰身從無相中受生猶如幻出諸形象幻人心識本來無罪福皆空無所住人壽八萬歲時此佛出世種剎利姓拘利若父槃頭母槃頭婆提居槃頭城坐波波羅樹下說法三會度人三十四萬八千神足二一名騫茶二名舍尸棄佛莊嚴劫第九百九十九尊偈曰起諸善法本是幻造諸惡業亦是幻身如聚沫心如風幻出無根無實性人壽七萬歲時此佛出世種剎利姓拘利若父明相母光耀居光相城坐分陀利樹下說法三會度人二十五萬神足二一阿毗浮二婆婆毗舍浮佛莊嚴劫一千尊偈曰假借四大以為身心本無生因境有前境若無心亦無罪福如幻起亦滅人壽六萬歲時此佛出世種剎利姓拘利若父善燈母稱戒居無喻城坐婆羅樹下說法二會度人一十三萬神足二一扶遊二多摩拘留孫佛賢劫第一尊偈曰見身無實是佛身了心如幻是佛幻了得身心本性空斯人與佛何殊別人壽四萬歲時此佛出世種婆羅門姓迦葉父禮得母善技居安和城坐尸利沙樹下說法一會度人四萬神足二一薩尼二毗樓拘那含牟尼佛賢劫二尊偈曰佛不見身知是佛若實有知別無佛智者能知罪性空坦然不怖于生死人壽三萬歲時此佛出世種婆羅門姓迦葉父大德母善勝居清淨城坐烏暫婆羅門樹下說法一會度人三萬神足二一舒槃那二多樓迦葉佛賢劫三尊偈曰一切眾生性清淨從本無生無可滅即此身心是幻生幻化之中無罪福人壽二萬歲時此佛出世種婆羅門姓迦葉父梵德母財主居婆羅奈城坐尼拘律樹下說法一會度人二萬神足二一提舍二婆羅婆釋迦牟尼佛賢劫第四尊姓剎利父淨飯王母摩耶剎利氏自天地更始閻浮洲初闢已來世為王佛歷劫修行值然燈佛授記於此劫作佛後於迦葉佛世以菩薩成道上生覩史陀天名護明大士及應運時至乃降神於摩耶當此士周昭王二十四年甲寅四月初八日自摩耶右脇誕生生時放大智光明照十方世界地湧金蓮花自然捧雙足一手指天一手指地周行七步目顧四方曰天上天下惟吾獨尊纔出胞胎脫體彰指天指地為人揚引他無限癡男女天上人間沒覆藏雲門云我當時若見一棒打殺與狗子喫貴圖天下太平自降生後種種神異具如經言至四十二年年十九二月八日欲求出家而自念言當復何遇即於四門遊觀見生老病死四等事心有悲喜而作思惟此老病死終可厭離於是夜子時有淨居天人於牕牖中叉手白言出家時至可去矣於是諸天捧所乘馬足超然凌虗逾城而去曰不斷八苦不成無上菩提不轉法輪終不還也淨飯王思甚遣其臣勸諭還宮者萬計確然不回入檀特山修道始於阿藍迦藍處三年學不用處定知非便捨復至頭藍弗處三年學非非想定知非亦捨又至象頭山同諸外道日食麻麥經於六年世尊自思曰今此苦行非正解脫吾當受食而後成佛即沐浴于尼連河天為之偃樹世尊援之而出受牧牛氏女所獻乳糜尋詣畢鉢樹下天帝化人擷瑞草以藉坐景雲祥風四起紛披天魔念世尊道成且受折抑率眾作難窮現可怖可欲諸境世尊泊然不動以指按地地大震魔皆顛仆於是降之故經云以無心意無受行而悉摧伏諸外道先歷試邪法示諸方便發諸異見令至菩提乃穆王三年癸未歲二月七日之夕入正三昧至八日明星出時廓然大悟成等正覺乃嘆曰奇哉一切眾生具有如來智慧德相但以妄想執著不能證得時年三十矣成道後六年歸為淨飯王說法王大喜遣其族五百貴子從出家世尊一日陞座大眾集定文殊白椎曰諦觀法王法法王法如是世尊便下座列聖叢中作者知法王法令不如斯會中若有僊陀客何必文殊下一椎正當向未陞座前勘破世尊一日陞座默然而坐阿難白椎曰請世尊說法世尊云會中有比丘犯律行故我不說法阿難以他心通觀是比丘遂乃遣出世尊還復默然阿難又白適來為二比丘犯律是二比丘已遣出世尊何不說法世尊云吾誓不為二乘聲聞人說法便下座前箭猶輕後箭深世尊憐憫示阿難幾人於此發深省世尊一日陞座迦葉白椎曰世尊說法竟便下座如是陞座如是白椎如是說法如是下座如是如是世尊在忉利天為母說法優填王思佛命匠雕栴檀像及世尊下忉利天像亦出迎世尊三喚三應乃云無為真佛實在我身世尊在忉利九十日及辭天界而下四眾八部俱往空界奉迎有蓮花色比丘尼作念云我是尼身必居大僧後見佛不如用神力變作轉輪聖王千子圍繞最初見佛果滿其願世尊纔見乃訶云蓮花色比丘汝何得越大僧見吾汝雖見吾色身且不見吾法身須菩提巖中宴坐却見吾法身畢竟那一个身世尊示隨色摩尼珠問五方天王此珠而作何色時五方天王互說異色世尊藏珠復擡手曰此珠作何色天王曰佛手中無珠何處有色世尊曰汝何迷倒之甚吾將世珠示之便強說有青黃赤白色吾將真珠示之便總不知時五方天王悉自悟道世珠真珠從何分別世尊因黑氏梵志獻合歡梧桐花佛召仙人放下著梵志放下左手一枝花佛又召仙人放下著梵志又放下右手一枝花佛又召仙人放下著梵志曰吾今兩手俱空更教放下箇甚麼佛曰吾非教汝放捨其花汝當放捨外六塵內六根中六識一時捨却無可捨處是汝放身命處梵志于言下悟無生忍既捨六根六塵六識甚麼處是無可捨處是免生死處又喚甚麼作無生忍世尊因普眼菩薩欲見普賢不可得見乃至三度入定徧觀三千大千世界覓普賢不可得見而來白佛佛曰汝但於靜三昧中起一念便見普賢於是普眼纔起一念便見普賢向空中乘六牙白象雲居道普眼推倒世尊世尊推倒普眼且道普眼在甚處未免傍觀者哂噫誰是傍觀者世尊因五通仙人問世尊有六通我有五通如何是那一通佛召五通仙人仙人應諾佛曰那一通你問我五通六通百千萬億通摠不出那一通世尊一日敕阿難食時將至汝當入城持鉢阿難應諾世尊曰汝既持鉢須依過去七佛儀式阿難便問如何是七佛儀式世尊召阿難阿難應諾世尊曰持鉢去佛佛儀容要現前瞿曇為說老婆禪可憐慶喜懡㦬去猶待人呼倒剎竿世尊因地布髮掩泥獻花于然燈佛然燈見布髮處遂約退眾乃指地曰此一方地宜建一梵剎時眾中有一賢于長者持標於指處插曰建梵剎竟時諸天散花相讚世尊甞與阿難行次見一古佛塔世尊便作禮阿難曰此是甚麼人塔世尊曰過去諸佛塔阿難曰過去諸佛是甚麼人弟子世尊曰是吾弟子阿難曰應當如是世尊因自恣日文殊三處過夏迦葉欲白椎擯出纔拈椎乃見百千萬億文殊迦葉盡其神力椎不能舉世尊遂問迦葉汝擬擯那个文殊迦葉無對迦葉果神通應把黃面老子先擯却城東有一老母與佛同生不欲見佛每見佛來即便回避雖然如此回顧東西總皆是佛遂以手掩面乃至十指掌中總皆是佛老姥不欲見佛風平浪靜東西總皆是佛水漲船高世尊因文殊至諸佛集處值諸佛各還本處唯有一女人近於佛坐而入三昧文殊乃白佛云何此人得近佛而我不得佛告文殊汝但覺此女令從三昧起汝自問之文殊繞女人三帀鳴指一下乃托至梵天盡其神力而不能出世尊曰假使百千文殊亦出此女人定不得下方過四十二恒河沙國土有罔明菩薩能出此女人定須臾罔明大士從地湧出作禮世尊世尊敕罔明出罔明却至女子前鳴指一下女子於是從定而出出得出不得且置作麼生是底定摠之看破個中關棙子了無一法異尋常佛性天真事誰云別有師罔明彈指處女子出禪時不費絲毫力何曾動所思眾生摠平等日用自多疑殃崛摩羅因持鉢至一長者門其家婦人正值產難長者曰瞿曇弟子汝為至聖當有何法能免產難殃崛語長者曰我乍入道未知此法待我回問世尊却來相報及返具事白佛佛告殃崛汝速去報言我從賢聖法來未曾殺生殃崛奉佛語疾往告之其婦得聞當時分㝃佛不殺生婦人分㝃日出東山月沉西畔華陰山前百尺井中有寒泉徹骨冷誰家美人來照影不照其餘照斜領世尊一日因文殊在門外立乃曰文殊文殊何不入門來文殊曰我不見一法在門外何以教我入門門外入門且置喚甚麼作門無邊身菩薩將竹杖量世尊頂丈六了又丈六量到梵天不見世尊頂乃擲下竹杖合掌說偈云虗空無有邊佛功德亦然若有能量者窮劫不可盡無邊身不自量而量世尊無盡頂未免多此一重疑案世尊因乾闥婆王獻樂其時山河大地皆作琴聲迦葉起作舞王問迦葉豈不是阿羅漢諸漏已盡何更有餘習佛曰實無餘習莫謗法也王又撫琴三徧迦葉亦三度作舞王曰迦葉作舞豈不是習佛曰實不曾作舞王曰世尊何得妄語佛曰不妄語汝撫琴山河大地木石盡作琴聲豈不是王曰是佛曰迦葉亦復如是所以實不曾作舞王乃信受風鳴水響無非樂法法全彰本現成世尊在第六天說大集經敕他方此土人間天上一切獰惡鬼神悉皆輯會受佛付囑擁護正法設有不赴者四天門王飛熱鐵輪追之令集既集會已無有不順佛敕者各發弘誓擁護正法唯有一魔王謂世尊曰瞿曇我待一切眾生成佛盡眾生界空無有眾生名字我乃發菩提心魔王魔王認那個作菩提心設使一切眾生成佛盡眾生界空無有眾生名字要發心也未許在世尊因靈山會上五百比丘得四禪定具五神通未得法忍以宿命智通各各自見殺父害母及諸重罪于自心內各各懷疑于甚深法不能證入於是文殊承佛神力遂手握利劒持逼如來世尊乃謂文殊曰爾從本已來無有我人但以內心見有我人內心起時我必被害即名為害於是五百比丘自悟本心如夢如幻于夢幻中無有我人乃至能生所生父母於是五百比丘同讚歎曰文殊大智士深達法源底自手握利劒持逼如來身如劒佛亦爾一相無有二無相無所生是中云何殺文殊為他閒事長無明帶累五百比丘打失鼻孔雖然還識世尊落處麼世尊因波斯匿王問勝義諦中有世俗諦否若言無智不應二若言有智不應一一二之義其義云何佛言大王汝于過去龍光佛時曾問此義我今無說汝今無聽無說無聽是為一義二義世尊滿口說匿王滿耳聽那裏是無說無聽處試簡點看世尊因長爪梵志索論義預約曰我義若墮當斬首以謝世尊曰汝義以何為宗志曰我以一切不受為宗世尊曰是見受否志拂袖而去行至中路有省乃歎曰我義兩處負墮是見若受負門處粗是見不受負門處細一切人天二乘不知我義墮處惟有世尊諸大菩薩知我義墮回至世尊前曰我義兩處負墮故當斬首以謝世尊曰我法中無如是事汝當回心向道于是同五百徒眾一時投佛出家證阿羅漢是見若受破家門是見不受共誰論匾擔驀折兩頭脫一毫頭上現乾坤機輪曾未轉轉必兩頭走明鏡忽臨臺當下分妍醜妍醜分兮慈雲開慈門何處生塵埃因思良馬窺鞭影千里追風喚得回是見受否轉迷驀忽知非辨己躬夾路桃花風雨後馬蹄何處避殘紅世尊在靈山會上拈花示眾是時眾皆默然唯迦葉尊者破顏微笑世尊曰吾有正法眼藏涅槃妙心實相無相微妙法門不立文字教外別傳付囑摩訶迦葉閙市𩗺碌磚冤頭定打着當時不掀倒禪牀致使後代兒孫謂有實法傳來世尊至多子塔前命摩訶迦葉分座令坐以僧伽黎圍之遂告以護持正法眼藏并敕阿難副貳傳化無令斷絕而說偈曰法本法無法無法法亦法今付無法時法法何曾法爾時世尊說此偈已復告迦葉吾將金縷僧伽黎衣傳付于汝轉授補處至慈氏佛出世勿令朽壞迦葉聞偈頭面禮足曰善哉善哉我當依敕恭順佛故盡說拈花微笑是不知將底辦宗風若言心眼同時證未免朧在夢中世尊臨入涅槃文殊大士請佛再轉法輪世尊咄曰文殊吾四十九年住世未曾說一字汝請吾再轉法輪是吾曾轉法輪耶黃面瞿曇在摩竭提國阿蘭若法菩提場中于一塵內破此一塵演說如來廣大境界妙音遐暢無處不及乃曰吾四十九年住世未曾說一字世尊于涅槃會上以手摩胸告眾曰汝等善觀吾紫磨金色之身瞻仰取足勿令後悔若謂吾滅度非吾弟子若謂吾不滅度亦非吾弟子時百萬億眾悉得契悟千年常住一朝僧觀他作麼爾時世尊至拘尸那城告諸大眾吾今背痛欲入涅槃即往熈連河側娑羅雙樹下右脇累足泊然宴寂復從棺起為母說法特示雙足化婆耆并說無常偈曰諸行無常是生滅法生滅滅已寂滅為樂時諸弟子即以香薪競茶毗之燼後金棺如故爾時大眾即于佛前以偈讚曰凡俗諸猛熾何能致火爇請尊三昧火闍維金色身爾時金棺從座而舉高七多羅樹往反空中化火三昧須臾灰生得舍利八斛四斗即穆王五十二年壬申歲二月十五日未出王宮已涅槃何須雙足露金棺致令迦葉雙眉皺慶喜門前倒剎竿臨行伸兩脚踏却斷嘗坑西天祖師一祖摩訶迦葉尊者摩竭陀國人姓婆羅門父號飲澤母號香至過去世為金師值毗婆尸佛般涅槃四眾起塔有貧女得金珠懇金師為補塔中佛像金面缺處相與發願世世為無姻夫妻由是因緣九十一劫身皆金色及此世與紫金光尼復為夫婦梵語迦葉波此云飲光葢以身光名然夫婦皆清淨自居無世間想旋復出家修杜多行會空中有神告曰佛已出世請往師之尊者即趨禮釋尊於竹林精舍佛言善來比丘鬚髮自除佛於眾中稱歎第一後因拈花因緣付法一華纔拈千聖膽落遇無知漢微笑而作死柴頭火今古輝爍佛涅槃時尊者在畢鉢羅窟以淨天眼見世尊在熈連河側入般涅槃即至雙樹悲戀號泣佛於金棺出示雙足尊者告比丘佛已茶毗金剛舍利非吾等事宜當結集法眼無令斷絕乃說偈告曰如來弟子且莫涅槃得神通者宜赴結集於是得神通者咸赴耆闍崛山畢鉢羅窟時阿難為漏未盡不得入會後證阿羅漢果乃入尊者告眾言此阿難比丘有大智慧所聞佛法如水傳器無有遺餘可請彼集修多羅藏大眾默然如此多聞人尚不得入會今人稍有涉略便祖父不足介意平人藐若鴻毛要到漏未盡田地敢保未夢見在結集既畢尊者自念衰老宜入定於雞足山以待彌勒乃召阿難言我今不久世間今將正法付囑於汝汝善守護聽吾偈曰法法本來法無法無非法何於一法中有法有不法燈燈相續如是受法如是付法若說有恁麼法何啻千里二祖阿難尊者王舍城人姓剎帝利父斛飯王實如來從弟也多聞博達智慧無礙世尊以為摠持第一梵云阿難此云慶喜以如來成道日生故名也者一日問迦葉曰師兄世尊傳金縷袈裟外別傳箇甚麼迦葉召阿難阿難應諾迦葉曰倒却門前剎竿著金襴傳外別何傳驀召阿難似不堪倒却門前剎竿着阿難依舊被他謾後阿闍世王白言尊者般涅槃時願垂告別尊者將入涅槃於恒河中流跏趺而坐阿闍世王毗舍離王皆在河側說偈勸請莫般涅槃者答偈曰二王善嚴住勿為苦悲戀涅槃當我靜而無諸有故復念我若向一國則諸國或爭應以平等度諸有情遂於恒河中流將入寂滅是時山河大地六種震動雪山有五百仙人覩茲瑞應飛空而至禮尊者足而白言我當于長老而證佛法願垂大慈度脫我等尊者默然受請即變殑伽河悉為金地為其仙眾說諸大法復念先所度脫弟子應當來集須臾五百羅漢從空而下為諸仙人出家受具其仙眾中有二羅漢一名商那和修二名末田底迦尊者知是法器而告之曰如來以正法眼付迦葉迦葉入定而付于我我今將滅復付于汝汝受吾教當聽偈言本來付有法付了言無法各各須自悟悟了無無法說偈已復以正法囑累商那和修而命末田底迦于罽賓國敷演大法云尊者踊身虗空現十八變分身四分一奉忉利天一奉娑竭羅龍宮一奉毗舍離王一奉阿闍世王各造塔三祖商那和修尊者姓毗舍多父林勝母憍奢耶摩突羅國人也在胎六年而生梵云商諾迦此云自然服乃西域九枝秀草名出則聖人降生尊者生而此草出昔如來行化至摩突羅國見一青林枝葉茂盛語阿難曰此林地名優留茶吾滅後一百年有比丘名商那和修於此轉妙法輪後百歲果誕和修出家證道受慶喜尊者法眼至此林遂降二火龍龍受三歸施其地以建梵宮青林懸記瑞草知期以毒破毒龍何能窺施地建剎反被印破尊者化緣既久思付法者尋於吒利國得優波毱多以為給侍因問毱多曰汝年幾耶答曰我年十七者曰汝身十七性十七耶答曰師髮已白為髮白耶心白耶者曰我但髮白非心白毱多曰我身十七非性十七尊者知是法器後三年遂為落髮受具而以法眼付囑之付法偈曰非法亦非心無心亦無法說是心法時是法非心法大小宗師話作兩橛四祖優波毱多尊者吒利國人也姓首陀父善意十七出家二十證果尊者得法已隨方行化至摩突羅國魔宮震動波旬愁怖遂竭其魔力以害正法尊者入三昧觀其所由魔伺便密持瓔珞縻之于頸及尊者出定乃取人狗蛇三屍化為華鬘軟語酬之魔引頸受鬘即變為臭屍蟲蛆壞爛魔盡其力竟不能脫乃禮尊者足哀露懺悔尊者令歸依三寶華鬘除尊者化導證果最多每度一人以一籌置於石室其室縱十八肘廣十二肘充滿其間最後有一長者子名曰香眾來禮尊者求出家尊者問曰汝身出冢心出家答曰我來出家非為身心尊者曰不為身心復誰出答曰夫出家者無我我故無我我故即心不生滅心不生滅即是甞道諸佛亦甞心無形相其體亦然尊者曰汝當大悟心自通達宜依佛法僧紹隆聖種即為剃度授具足戒仍告之曰汝父夢金日而生可名提多迦如來以大法眼藏次第傳授以至於我今復付汝聽吾偈曰心自本來心本心非有法有法有本心非心非本法五祖提多迦尊者摩伽陀國人也初名香眾生時父夢金日自屋而出炤耀天地前有大山諸寶嚴飾山頂泉湧滂沱四流後遇毱多尊者為解之曰寶山者吾身也泉湧者法無盡也日從屋出者汝今入道之相也照耀天地者汝智慧超越也因為更今名梵云提多迦此云通真量尊者聞已踴躍述偈曰巍巍七寶山常出智慧泉回為真法味能度諸有緣毱多尊者亦說偈曰我法傳於汝當現大智慧金日從屋出照耀於天地尊者聞偈設禮奉持本法豈繇傳繇傳本法傳今傳傳本法本法本誰傳後至中印度彼國有八千大仙彌遮迦為首聞尊者至率眾瞻禮謂尊者曰昔與師同生梵天我遇阿私陀仙授我仙法師逢十力弟子修習禪那自此報分殊途已經六劫者曰支離累劫誠哉不虗今可捨邪歸正以入佛乘彌遮迦曰昔阿私陀仙人授我記云汝却後六劫當遇同學獲無漏果今也相遇非夙緣耶願師慈悲令我解脫者即度出家命諸聖授戒其餘仙眾始生我慢尊者示大神通於是俱發菩提心一時出家者乃告彌遮迦曰昔如來以大法眼藏密付迦葉展轉相授而至於我我今付汝當護念之乃說偈曰通達本法心無法無非法悟了同未悟無心亦無法六祖彌遮迦尊者中印度人既傳法已遊化至北天竺國見雉堞上有金色祥雲歎曰斯道人氣也必有大士為吾嗣乃入城於闤闠間有一人手持酒器逆而問曰師何方來欲往何所祖曰從自心來欲往無處曰識我手中物否祖曰此是觸器而負淨者曰師識我否祖曰我即不識識即非我復謂之曰汝試自稱名氏吾當示汝本因彼說偈答曰我從無量劫至於生此國本姓頗羅墮名字婆須密祖曰我師提多迦說世尊昔遊北印度語阿難言此國中吾滅度後三百年有一聖人姓頗羅墮名婆須密而於禪祖當獲第七世尊記汝汝應出家彼乃置器禮師側立而言曰我思往劫甞作檀那獻一如來寶座彼佛記我曰汝於賢劫釋迦法中宣傳至教今符師說願加度脫祖即與披剃復圓戒相乃告之曰正法眼藏今付於汝勿令斷絕乃說偈曰無心無可得說得不名法若了心非心始解心心法七祖婆須密尊者北天竺國人甞服淨衣執酒器遊行里閈或吟或嘯人謂之狂及遇彌遮迦尊者宣如來往誌自省前緣投器出家受法行化至迦摩羅國廣興佛事於法座前忽有智者自稱我名佛陀難提今與師論義祖曰仁者論即不義義即不論若擬論義終非義論難提知師義勝心即欽服曰我願求道甘露味祖遂與剃度而授具戒復告之曰如來正法眼藏我今付汝汝當護持乃說偈曰心同虗空界示等虗空法證得虗空時無是無非法時梵王帝釋及諸天眾俱來作禮而說偈言賢劫眾聖祖而當第七位尊者哀念我請為宣佛地尊者從三昧起示眾曰我所得法而非有故若說佛地離有無故語已還入三昧示涅槃相難提即於座起七寶塔以塟全身是定王十九年辛未歲也八祖佛陀難提尊者迦摩羅國人姓瞿曇氏頂有肉髻辨捷無礙受婆須蜜尊者法行化至提伽國毗舍羅家見舍上有白光上騰謂其徒曰此家有聖人口無言說真大乘器不行四衢知觸穢耳長者出致禮問何所須祖曰我求侍者長者曰我有一子名伏䭾蜜多年已五十口未曾言足未曾履祖曰如汝所說真吾弟子伏䭾聞之遽起禮拜而說偈曰父母非我親誰是最親者諸佛非我道誰是最道者祖以偈答曰汝言與心親父母非可比汝行與道合諸佛心即是外求有相佛與汝不相似欲識汝本心非合亦非離伏䭾聞偈已便行七步祖曰此子昔曾值佛悲願廣大慮父母愛情難捨故不言不履耳長者遂捨令出家祖尋授具戒付法說偈曰虗空無內外心法亦如此若了虗空故是達真如理一語便知歸不負生來肉髻九祖伏䭾蜜多尊者提伽國人姓毗舍羅行化至中印度有長者香葢携一子而來瞻禮曰此子處胎六十歲正宗作十六甞有一仙謂此兒骨相非甞今遇尊者可捨令出家祖即與落髮羯磨之際祥光燭座感舍利三十粒現前自此精進忘疲未幾祖遂付法說偈曰真理本無名應名顯真理受得真實法非真亦非偽付法已即入滅盡三昧而般涅槃眾以香油旃檀闍維收舍利建塔于那爛陀寺即敬王甲寅歲十祖脇尊者中印度人姓氏未詳處胎六十年將誕之夕母夢白象載一寶座座置一明珠入門乃生生而神光燭室體有奇香及長雖穀食絕無穢滓本名難生後侍九祖執侍左右未甞睡眠謂其脇不至席遂號脇尊者初至華氏國憩一樹下右手指地而告眾曰此地變金色當有聖人入會言訖即變金色時有長者子富那夜奢合掌前立祖問曰汝從何來曰我心非往祖曰汝何處住曰我心非止祖曰汝不定耶曰諸佛亦然祖曰汝非諸佛曰諸佛亦非祖即度出家復具戒品而付法說偈曰真體自然真因真說有理領得真真法無行亦無止付法已即現神變而入涅槃化火自焚四眾各以衣裓盛舍利隨處建塔脇不至席脊梁鐵鑄踏翻金色地覰破佛祖機十一祖富那夜奢尊者華氏國人姓瞿曇氏遇脇尊者遂授法祖教被無量得果者且五百矣後至波羅柰國有一長者來趣其會祖謂眾曰汝等識此來者耶佛記聖者馬鳴紹吾法者也於是馬鳴致禮問曰我欲識佛何者即是祖曰汝欲識佛不識者是彼曰佛既不識焉知是乎祖曰既不識佛焉知不是曰此是鋸義祖曰彼是木義祖問鋸義者何曰與師平出馬鳴却問木義者何祖曰汝被我解馬鳴豁然省悟遂求剃度祖謂眾曰此大士者昔為毗舍利國王以其國有一類裸人如馬裸露王遂運神通分身為蠶以衣之後生中印度馬人感戀悲鳴故號馬鳴如來懸記滅度後六百年馬鳴當于波羅柰國摧伏異道度人無量今正是時遂付法偈曰迷悟如隱顯明暗不相離今付隱顯法非一亦非二寔義熾然無錯無悞說甚麼感戀悲鳴二與非二十二祖馬鳴大士者波羅柰國人也亦名功勝以有作無作諸功德最為殊勝故名焉既受法于夜奢尊者後于華氏國轉妙法輪忽有老人座前仆地祖謂眾曰此非庸流當有異相言訖不見俄從地湧出一金色人復化為女子右手指祖而說偈曰稽首長老尊當受如來記今於此地上宣通第一義說偈已瞥然不見祖曰將有魔來與吾較力有頃風雨暴至天地晦冥祖曰魔之來信矣吾當除之即指空中現一大金龍奮發威神震動山嶽祖儼然於座魔事隨滅經七日有一小蟲大若蟭螟潛形座下祖以手取之示眾曰斯乃魔之所變盜聽吾法耳放之令去魔不能動祖告之曰汝但歸依三寶即得神通遂復本形作禮懺悔祖問曰汝名誰耶眷屬多少曰我名迦毗摩羅有三千眷屬祖曰盡汝神力變化若何曰我化巨海極為小事祖曰汝化性海得否曰何為性海我未甞知祖即為說性海曰山河大地皆依建立三昧六通由茲發現迦毗摩羅聞言遂發信心與徒眾三千俱求剃度祖乃召五百羅漢與授具戒復告之曰如來大法眼藏今當付汝汝聽偈言隱顯即本法明暗元不二今付悟了法非取亦非離露出空中爪牙摧伏大幻冤敵藉得一番神通魔佛到此皆息十三祖迦毗摩羅尊者華氏國人也初為外道有徒三千通諸異論後于馬鳴尊者得法領徒至西印度彼有太子名雲自在仰尊者名請于宮中供養祖曰如來有教沙門不得親近國王大臣有勢之家太子曰今我國城之北有大山焉山有一石窟可禪寂於此否祖曰諾即入彼山行數里逢一大蠎祖直前不顧盤繞祖身祖因與授三歸依蠎聽訖而去祖將至石窟復有一老人素服而出合掌問訊祖曰汝何所止答曰我昔甞為比丘多樂寂靜有初學比丘數來請益而我煩于應答起嗔恨想命終墮為蠎身住是窟中今已千載適遇尊者獲聞戒法故來謝耳祖問曰此山更有何人居止曰此去十里有大樹蔭覆五百大龍其樹王名龍樹甞為龍眾說法我亦聽受耳祖遂與徒眾詣彼龍樹出迎曰深山孤寂龍蠎所居大德至尊何枉神足祖曰吾非至尊來訪賢者龍樹默念曰此師得決定性明道眼否是大聖繼真乘否祖曰汝雖心語我已意知但辦出家何慮吾之不聖龍樹聞已悔謝祖即與度脫及五百龍眾俱受具戒復告曰如來大法眼藏今付囑汝諦聽偈言非隱非顯法說是真實際悟此隱顯法非愚亦非智巨蟒皈依毒龍受戒神通智力則不無非隱非顯法未夢見在十四祖龍樹尊者亦名龍勝少則能誦四韋陀長而善知眾藝才辯神明出家入石窟棲止龍樹為龍眾所歸遇摩羅尊者付法後至南印度彼國之人多信福業祖為說法相謂曰人有福業世間第一徒言佛性誰能覩之祖曰汝欲見佛性先須除我慢彼人曰佛性大小祖曰非大非小非廣非狹無福無報不死不生彼聞理勝悉回初心祖復於座上現自在身如滿月輪一切眾惟聞法音不覩祖相彼眾中有長者子名迦那提婆謂眾曰識此相否眾曰目所未覩安能辨識提婆曰此是尊者現佛性體相以示我等何以知之葢以無相三昧形如滿月佛性之義廓然虗明言訖輪相即隱復居本座而說偈言身現圓月相以表諸佛體說法無其形用辨非聲色彼眾聞偈頓悟無生咸願出家以求解脫祖即為剃髮命諸聖授具造大智度論中論十二門論垂之於世後付法於迦那提婆付法偈云為明隱顯法方說解脫理於法心不證無嗔亦無喜當場現月輪性義廓虛明覰破千萬里非色亦非聲十五祖迦那提婆尊者南天竺國人也姓毗舍羅初求福業兼要辯論後謁龍樹大士將及門龍樹知是智人先遣侍者以滿鉢水寘於座前尊者覩之即以一針投之而進欣然契會既得法後至迦毗羅國彼有長者曰梵摩淨德捨次子羅睺羅多隨師出家祖曰昔如來記此子當第二五百年為大教主今相遇符宿因即與剃髮手握乾坤劒胸藏日月旗機先嘗展演佛祖豈能窺淨德家有園樹生耳如菌味甚美惟德與第二子羅多得取而食之取已隨長盡而復生自餘親屬皆不能見迦那知其宿因示曰汝昔曾供養一比丘此比丘道眼未明以虗霑信施故報為木菌惟汝與子精誠供養故得享之針投鉢覩月輪悉木菌因識比丘戒真刺腦入膠盆打草便驚蛇者至巴連弗城聞諸外道欲障佛法計之既久祖乃執長旛入彼眾中彼問祖曰汝何不前祖曰汝何不後彼曰汝似賤人祖曰汝似良人彼曰汝解何法祖曰汝百不解彼曰我欲得佛祖曰我灼然得佛彼曰汝不合得祖曰元道我得汝實不得彼曰汝既不得云何言得祖曰汝有我故所以不得我無我我故自當得彼辭既屈乃問祖曰汝名何等祖曰我名迦那提婆彼既夙聞祖名乃悔過致謝時眾中猶互興問難祖折以無礙之辯由是歸伏告上足羅睺羅多而付法眼偈曰本對傳法人為說解脫理於法實無證無終亦無始漢文帝庚辰歲身放八光而歸寂滅十六祖羅睺羅多尊者迦毗羅國人也行化至室羅筏城有河名曰金水其味殊美中流復現五佛影祖告眾曰此河之源凡五百里有聖者僧伽難提居於彼處佛志一千年後當紹聖位語已領諸學眾溯流而上至彼見僧伽難提安座入定祖與眾伺之經三七日方從定起祖問曰汝心定耶身定耶提曰身心俱定祖曰身心俱定何有出入提曰雖有出入不失定相如金在井金體甞寂祖曰若金在井若金出井金無動靜何物出入提曰言金動靜何物出入言金出入金非動靜祖曰若金在井出者何金若金出井在者何物提曰金若出井在者非金金若在井出者非物祖曰此義不然提曰彼義非著祖曰此義當墮提曰彼義不成祖曰彼義不成我義成矣提曰我義雖成法非我故祖曰我義已成我無我故提曰我無我故復成何義祖曰我無我故故成汝義提曰仁者師誰得是無我祖曰我師迦那提婆證是無我難提以偈贊曰稽首婆提師而出於仁者仁者無我故我欲師仁者祖以偈答曰我已無我故汝須見我我汝若師我故知我非我我難提心意豁然求度脫祖曰汝心自在非我所繫而付法眼偈曰於法實無證不取亦不離法非有無相內外云何起藉樹頭耳聞世外調佛誌不虗祖燈斯紹窮金河源垂千仞釣十七祖僧伽難提尊者室羅筏城寶莊嚴王之子也生而能言甞讚佛事七歲即厭世樂以偈告其父母曰稽首大慈父和南骨血母我今欲出家幸願哀愍故父母固止之遂終日不食乃許其在家出家號僧伽難提復命沙門禪利多為之師積十九載未甞退倦每自念言身居王宮胡為出家一夕天光下矚見一路坦平不覺徐行約十里許至大巖前有石窟焉乃燕寂於中父既失子即擯禪利多出國訪尋其子不知所在經十年祖得法受記已行化至摩提國忽有涼風襲眾身心悅適非甞而不知其然祖曰此道德之風也當有聖者出世嗣續祖燈言訖以神力攝諸大眾遊歷山谷食頃至一峯下謂眾曰此峯頂有紫雲如葢聖人居此矣即與大眾徘徊久之見山舍一童子持圓鑑直造祖前祖問汝幾歲耶曰百歲祖曰汝年尚幼何言百歲童曰我不會理正百歲耳祖曰汝善機耶童曰佛言若人生百歲不會諸佛機不如生一日而得決了之祖曰汝手中者當何所表童曰諸佛大圓鑑內外無瑕翳兩人同得見心眼皆相似彼父母聞子語即捨令出家祖携至本處受具戒訖名伽耶舍多他時聞風吹殿鈴聲祖問曰鈴鳴耶風鳴耶曰非風鈴鳴我心鳴耳祖曰心復誰乎曰俱寂靜故祖曰善哉善哉繼吾道者非子而誰即付法眼偈曰心地本無生因地從緣起緣種不相妨華果亦復爾付法已即右手攀樹而化大眾就樹下起塔敝屣世榮宴坐石窟冤債相尋磁石引鐵十八祖伽耶舍多尊者摩提國人也姓頭藍父天葢母方聖甞夢大神持鑑因而有娠凡七日而誕肌體瑩如琉璃未甞洗沐自然香潔幼好閒靜語非甞童持鑑出遊遇難提尊者得度後領徒至大月氏國見一婆羅門舍有異氣祖將入舍舍主鳩摩羅多問曰是何徒眾祖曰是佛弟子彼聞佛號心神竦然即時閉戶祖良久扣其門羅多云此舍無人祖曰答無者誰羅多聞語知是異人遽開門延接祖曰昔世尊記曰吾滅後一千年有大士出現於月氏國紹隆玄化今汝值吾應斯嘉運於是鳩摩羅多發宿命智投誠出家受具訖付法偈曰有種有心地因緣能發萌於緣不相礙當生生不生付法已即踊身虗空現十八變火光三昧自焚其身眾收舍利起塔諸佛機風鈴旨直饒說得道理分明未免鐵枷安項上十九祖鳩摩羅多尊者大月氏國婆羅門之子後至中天竺國有大士名闍夜多問曰我家父母素信三寶而甞縈疾瘵凡所營作皆不如意鄰家久為旃陀羅以殺為業而身甞勇健所作和合彼何幸而我何辜祖曰何足疑乎且善惡之報有三時焉凡人但見仁夭暴壽逆吉義凶便謂亡因果虗罪福殊不知影響相隨毫釐靡忒縱經百千萬劫亦不磨滅時闍夜多聞是語已頓釋所疑祖曰汝雖已信三業而未明業從惑生惑依識有識依不覺不覺依心心本清淨無生滅無造作無報應無勝負寂寂然靈靈然汝若入此法門可與諸佛同矣一切善惡有為無為皆如夢幻闍夜多承言領旨即發宿慧懇求出家既受具祖告曰吾今寂滅時至汝當紹行化跡付法眼偈曰性上本無生為對求人說於法既無得何懷決不決得般若力當場指出摸着鼻孔虛空逼塞二十祖闍夜多尊者北天竺國人也智慧淵冲化道無量後至羅閱城敷揚頓教彼有學眾惟尚辯論為之首者名婆修盤頭常一食不臥六時禮佛清淨無欲為眾所歸祖將欲度之先問彼眾曰此徧行頭陀能修梵行可得佛道乎眾曰我師精進何故不可祖曰汝師與道遠矣設苦行歷於塵劫皆虗妄之本也眾曰尊者蘊何德行而譏我師祖曰我不求道亦不顛倒我不禮佛亦不輕慢我不甞坐亦不懈怠我不一食亦不雜食我不知足亦不貪慾心無所希名之曰道時徧行聞已發無漏智歡喜讚歎祖又語彼眾曰會吾語否吾所以然者為其求道心切夫絃急即斷故吾不贊令其住安樂地入諸佛智復告徧行曰吾適對眾挫抑仁者得無惱于衷乎徧行曰我聞諸惡言如風如響況今獲聞無上甘露而反生熱惱耶惟願大慈以妙道垂誨祖曰汝久植眾德當繼吾宗聽吾偈曰言下合無生同於法界性若能如是解通達事理竟宿慧頓發默契厥元體本無生法有何說至簡至易最尊最貴徃還千聖頂𩕳頭世出世間不思議彈指圓成八萬門一超直入如來地二十一祖婆修盤頭尊者羅閱城人也年十五禮光度羅漢出家感毗婆訶菩薩與之受戒行化至那提國彼王名常自在有二子長名摩訶羅次名摩孥羅王問祖曰羅閱城土風與此何異祖曰彼曾三佛出世今王國有二師化導王曰二師者誰祖曰佛記第二五百年有二神力大士出家繼聖一即王之次子摩拏羅吾雖德薄亦當其一初那提國有惡象為害拏羅生而象息至是三十年矣人尚不知其所以息王方同祖語忽使者報有象巨萬餘逼城王憂之祖曰拏羅出患解矣王試命拏羅出拏羅遂出城南向象撫腹大喝城為震動羣象顛仆頃皆馳散至是人始知三十年之安以拏羅也王大敬信命拏羅依祖出家祖即與授具付法偈曰泡幻同無礙如何不了悟達法在其中非今亦非古逗着知歸黑玉白鐵當頭向說明月寒雪二十二祖摩拏羅尊者姓剎帝利父常自在王受盤頭尊者命祖遂出家傳法後至月支國鶴勒那與寶印迎祖至王宮供養異日鶴勒那問祖曰我有何緣而感鶴眾祖曰汝第四劫中常為比丘當赴會龍宮汝諸弟子咸欲隨從汝觀五百眾中無有一人堪任妙供時諸弟子曰師甞說法於食等者於法亦等今既不然何聖之有汝即令赴會坐是濫食報為羽族師弟夙緣故今相隨鶴勒那曰以何方便令彼解脫祖曰吾有無上法寶是如來藏世尊昔付大迦葉展轉至我我今付汝能傳之不絕彼鶴之眾亦資以解脫汝受吾教聽說偈曰心隨萬境轉轉處實能幽隨流認得性無喜亦無憂鶴眾聞偈飛鳴而去誕質王宮達茲玄奧應佛懸記分燈化導鶴眾解脫如火就燥二十三祖鶴勒那尊者月支國人姓婆羅門父千勝母金光以求子禱于七佛金幢夢須彌頂有神童持金環云我來及誕而天雨花年二十二出家棲一林間九白誦大般若感鶴眾相隨三十得法行化至中印度有師子者歸依焉問曰我欲求道當何用心祖曰汝欲求道無所用心曰既無用心誰作佛事祖曰汝若有用即非功德汝若無作即是佛事經云我所作功德而無我所故師子聞是語已即入佛慧時祖忽指東北問曰是何氣象師子曰我見氣如白虹貫乎天地復有黑氣五道橫亘其中祖曰其兆云何曰莫可知矣祖曰吾滅後五十年北天竺國當有難起嬰在汝身吾將滅已今以法眼付囑於汝善自護持乃說偈曰認得心性時可說不思議了了無可得得時不說知付法已即現十八變而歸寂闍維畢分舍利各欲起塔尊者復現空中而說偈曰一法一切法一切一法攝吾身非有無何分一切塔大眾聞偈遂不復分就䭾都場而建塔冤債相逢香結成穗祖脉潛通異氣徹應二十四祖師子比丘尊者中印度人姓婆羅門得法遊方至罽賓國有沙門波利迦本習小乘禪觀其徒有五曰禪定曰知見曰執相曰捨相曰不語尊者以無礙辯折之令其歸正既攝五眾名聞遐邇方求法嗣遇一長者引其子問祖曰此子名斯多當生便拳左手年二十矣終未能舒願尊者示其宿因祖覩之即以手接曰可還我珠童子遽開手奉珠眾皆驚異祖曰吾前報為僧有童子名婆舍吾甞赴西海齋受䞋珠付之今還吾珠理固然矣長者遂令出家祖會眾聖與授具以前緣故名婆舍斯多祖即謂之曰吾師密有懸記罹難非久如來正法眼藏今當付汝汝應保護普潤來際偈曰正說知見時知見俱是心當心即知見知見即於今祖說偈已以僧伽黎密付斯多俾之他國隨機演化斯多受教直抵南天祖謂難不可苟免獨留罽賓時本國有外道二人一名摩目多二名都落遮學諸幻法欲共謀亂詭為釋子潛入王宮其王彌羅崛遂滅毀釋教秉劒至尊者所問曰師得蘊空否祖曰已得蘊空王曰離生死否祖曰已離生死王曰既離生死可施我頭祖曰身非我有何怯于頭王即揮刃斷尊者首白乳涌高數尺王之右臂旋亦墮地七日而終太子光首嘆曰我父何故自取其禍延眾懺悔時象白山有仙人深明因果言師子與羅崛往世皆為白衣以嫉法勝故陰戕於崛乃今償焉眾遂以祖報體建塔道不可求用即功頭落臂斷冤債相尋首隨鋒刃落彼此沒毫釐二十五祖婆舍斯多尊者罽賓國人姓婆羅門父寂行母甞安樂初母夢得神劒因而有孕既誕拳左手遇師子尊者付法後至中印度國王迦勝設禮供養有外道無我尊先亦為王禮重乃于王前論義冀勝祖自重謂祖曰我解默論不假言說祖曰孰知勝負彼曰不爭勝負但取其義祖曰汝以何為義彼曰無心為義祖曰汝既無心豈得義乎彼曰我說無心當名非義祖曰汝說無心當名非義我說無心當義非名彼曰當義非名誰能辯義祖曰汝名非義此名何名彼曰為辨非義是名無名祖曰名既非名義亦非義辨者是名當辨何物如是往返五十九番外道杜口信伏于時祖忽而北合掌長吁曰我師師子尊者今日遇難斯可傷焉即辭王南邁至南天潛隱山谷王天德迎請供養王次子不如密多遂求出家祖問曰汝欲出家當為何事密多曰我若出家不為其事祖曰不為何事密多曰不為俗事祖曰當為何事密多曰當為佛事祖曰王子智慧天至必諸聖降跡即度出家侍祖六年後受具羯磨之際大地震動乃付法偈曰聖人說知見當境無是非我今悟真性無道亦無理神劒本銛拳珠自瑩其來有因肘後懸印二十六祖不如密多尊者姓剎帝利南印度王子得法後至東印度其王堅固奉外道師長爪梵志祖至王問曰師來何為曰將度眾生曰以何法度曰各以其類度之梵志即化一大山于祖頂上勢且下壓祖指之山遽移彼眾頂上復以手按地地動五百外道皆不能立梵志怖懼禮懺祖復按地地靜指山山滅王異日大治齋集諸外道懇祖預會祖初不欲行而知所會地將陷乃往王曰師肯來耶祖曰吾非應供來救死耳此地已為龍窟須臾當下陷王恐與其眾如高原反顧其地已淵然成湫矣王益敬信祖為演法且曰國有聖人當繼我法先是東印有婆羅門子年二十幼失父母不知名氏或自言瓔珞人遂名瓔珞童子丐行閭里有問汝行何急即曰汝行何緩問何姓即曰與汝同姓人莫測之一日王與祖同車而出瓔珞稽首于前祖曰汝憶往事否珞曰我念往劫中與師同居師演摩訶般若我演甚深修多羅今日之事葢契昔因祖顧王曰此大勢至菩薩也繼後出二人一化南印度一人緣在震旦九年却返此方即以昔因名般若多羅付法偈曰真性心地藏無頭亦無尾因緣而化物方便呼為智外道為山自貽伊戚俾歸真乘反曲作直故人忽逢二五一十二十七祖般若多羅尊者東印度人得法後至南印度彼王名香至尊重供養度越倫等又施無價寶珠時王有三子曰月淨多羅曰功德多羅曰菩提多羅其季開士也祖欲試其所得乃以所施珠問三王子曰此珠圓明有能及否月淨功德皆曰此珠七寶中尊固無踰也菩提曰此是世寶未足為上於諸寶中法寶為上此是世光未足為上於諸光中智光為上此是世明未足為上於諸明中心明為上此珠光明不能自炤要假智光以辨於此既辨此已即知是珠然則師有其道其寶即現眾生有道心寶亦然祖歎其辨慧乃復問曰於諸物中何物無相曰於諸物中不起無相又問於諸物中何物最高曰於諸物中人我最高又問於諸物中何物最大曰於諸物中法性最大祖知是法器透明透暗解見無邊無剎規模一日王問諸人盡轉經師為甚不轉尊者曰貧道出息不隨眾緣入息不居陰界常轉如是經百千萬億卷多多卷數從何數不轉之轉若箇知香至王厭世眾皆號絕菩提多羅獨於柩前入定經七日而出遂依祖求出家既授具祖告曰如來以正法眼付大迦葉如是展轉乃至於我我今囑汝聽吾偈曰心地生諸種因事復生理果滿菩提圓花開世界起付法已即于座上起立舒左右手各放光明二十七道五色光耀又踊身虗空高七多羅樹化火自焚空中舍利如雨收以建塔勢至勢至為法之寄轉經不落文字放光更沒巴鼻東土祖師初祖菩提達磨大師者南天竺國香至王第三子也姓剎帝利本名菩提多羅後於般若多羅尊者得法尊者謂曰汝於諸法已得通量達磨者通大之義也因改今名祖恭稟教義服勤四十年迨尊者順世遂演化本國時有二師一名佛大先二名佛大勝多與祖同學佛陀跋陀小乘禪觀佛大先既遇般若波羅尊者捨小趣大與祖並化時號為二甘露門而大勝多更分徒為六宗第一有相宗第二無相宗第三定慧宗第四戒行宗第五無得宗第六寂靜宗各封己解別展化源祖喟然嘆曰彼之一師已陷牛跡況復支離而分六宗我若不除永纏邪見言已微現神力至有相宗所問曰一切諸法何名實相彼眾有一尊長薩婆羅答曰於諸相中不互諸相是名實相祖曰一切諸相而不互者是名實相當何定耶彼曰於諸相中實無有定若定諸相何名為實祖曰諸相不定便名實相汝今不定當何得之彼曰我言不定不說諸相當說諸相其義亦然祖曰汝言不定當為實相定不定故即非實相彼曰定既不定即非實相知我非故不定不變祖曰汝今不變何名實相已變已往其義亦然彼曰不變當在在不在故故變實相以定其義祖曰實相不變變即非實於有無中何名實相薩婆羅心知聖師懸解潛達即以手指虗空曰此是世間有相亦能空故當我此身得似此否祖曰若解實相即見非相若了非相其色亦然當于色中不失色體于非相中不礙有故若能是解此名實相彼眾聞已心意朗然欽禮信受祖瞥然匿跡至無相宗所問曰汝言無相當何證之彼眾中有波羅提答曰我明無相心不現故祖曰汝心不現當何明之彼曰我明無相心不取捨當於明時亦無當者祖曰於諸有無心不取捨又無當者諸明無故彼曰入佛三昧尚無所得何况無相而欲知之祖曰相既不知誰云有無尚無所得何名三昧彼曰我說不證證無所證非三昧故我說三昧祖曰非三昧者何當名之汝既不證非證何證波羅提聞祖辯柝即悟本心禮謝懺悔祖記曰汝當得果不久證之此國有魔非久降之言已至定慧宗所問曰汝學定慧為一為二彼眾中有婆蘭陀者答曰我此定慧非一非二祖曰既非一二何名定慧彼曰在定非定處慧非慧一既非一二亦不二祖曰當一不一當二不二既非定慧約何定慧彼曰不一不二定慧能知非定非慧亦復然矣祖曰慧非定故然何知哉不一不二誰定誰慧婆蘭陀聞之疑心氷釋至第四戒行宗所問曰何者名戒云何名行當此戒行為一為二彼眾中有一賢者答曰一二二一皆彼所生依教無染此名戒行祖曰汝言依教即是有染一二俱破何言依教此二違背不及於行內外非明何名為戒彼曰我有內外彼已知竟既得通達便是戒行若說違背俱是俱非言及清淨即戒即行祖曰俱是俱非何言清淨既得通故何談內外賢者聞之即自慚伏至無得宗所問曰汝云無得無得何得既無所得亦無得得彼眾中有寶靜者答曰我說無得非無得得當說得得無得是得祖曰得既不得得亦非得既云得得得得何得彼曰見得非得非得是得若見不得名為得得祖曰得既非得得得無得既無所得當何得得寶靜聞之頓除疑網至寂靜宗所問曰何名寂靜於此法中誰靜誰寂彼眾中有尊者答曰此心不動是名為寂於法無染名之為靜祖曰本心不寂要假寂靜本來寂故何用寂靜彼曰諸法本空以空空故於彼空空故名寂靜祖曰空空已空諸法亦爾寂靜無相何靜何寂彼尊者聞師指誨豁然開悟既而六眾咸誓歸依由是化被南天聲馳五印經六十載度無量眾後值異見王輕毀三寶每云我之祖宗皆信佛道陷於邪見壽年不永運祚亦促且我身是佛何更外求皆因多智之者妄搆其說遂於國內耆舊為前王所奉者悉從廢黜祖知已歎彼德薄當何救之即念無相宗中二首領其一波羅提者與王有緣將證其果其二宗勝者非不博辯而無宿因時六徒眾亦各念言佛法有難師何自安祖遙知眾意即彈指應之六眾聞云此是我師達磨信響我等宜速行以副慈命即至祖所禮拜問訊祖曰一葉翳空孰能翦拂宗勝曰我雖淺薄敢憚其行祖曰汝雖辯慧道力未全宗勝自念縱彼福慧為王我是沙門受佛教旨豈難敵也言訖潛去至王所廣說法要及世界苦樂人天善惡等事王與之往返徵詰無不詣理王曰汝今所解其法何在宗勝曰如王治化當合其道王所有道其道何在王曰我所有道將除邪法汝所有法將伏何人祖不起於座懸知宗勝義墮告波羅提曰宗勝不稟吾教潛化於王須臾理屈汝可速救波羅提恭稟祖旨雲生足下至大王前默然而住時王正問宗勝忽見波羅提乘雲而至愕然忘其問答曰乘空之者是正是邪提曰我非邪正而來正邪王心若正我無邪正王雖驚異而驕慢方熾即擯宗勝令出波羅提曰王既有道何擯沙門我雖無解願王致問王怒而問曰何者是佛提曰見性是佛王曰師見性否提曰我見佛性王曰性在何處提曰性在作用王曰是何作用我今不見提曰今現作用王自不見王曰於我有否提曰王若作用無有不是王若不用體亦難見王曰若當用時幾處出現提曰若見現時當有其八王曰其八出現當為我說波羅提即說偈曰在胎為身處世為人在眼曰見在耳曰聞在鼻辯香在口談論在手執捉在足運奔徧現俱該沙界收攝在一微塵識者知是佛性不識喚作精魂王聞偈已心即開悟悔謝前非咨詢法要朝夕忘倦迄於九旬時宗勝既被斥逐退藏深山念曰我今百歲八十為非二十年來方歸佛道性雖愚昧行絕瑕疵不能禦難生何如死即自投崖俄有神人以手捧承置於巖上安然無損宗勝曰我忝沙門當與正法為主不能抑絕王非是以損身自責何神佑助一至於斯願垂一語於是神人乃說偈曰師壽於百歲八十而造非為近至尊故熏脩而入道雖具少智慧而多有彼我所見諸賢等未甞生珍敬二十年功德其心未恬靜聦明輕慢故而獲至於此得王不敬者當感果如是自今不疎怠不久成奇智諸聖悉存心如來亦復爾宗勝聞偈欣然即於巖上宴坐時王復問波羅提曰仁者智辯當師何人提曰我所出家即婆羅寺烏沙婆三藏為受業師其出世師者即大王叔菩提達磨是也王聞祖名驚駭久之曰鄙薄忝嗣王位而趣邪背正忘我尊叔遽敕近臣特加迎請祖即隨使而至為王懺悔往非王聞規誡泣謝於祖又詔宗勝歸國大臣奏曰宗勝被謫投崖今已亡矣王告祖曰宗勝之死皆自於吾如何大慈令免斯罪祖曰宗勝今在巖間宴息但遣使召當即至矣王即遣使入山果見宗勝端居禪寂宗勝蒙召乃曰深愧王意貧道誓處巖泉且國王賢德如林達磨是王之叔六眾所師波羅提法中龍象願王崇仰二聖以福皇基使者復命未至祖謂王曰知取得宗勝否王曰未知祖曰一請未至再命必來良久使還果如祖語祖遂辭王曰當善脩德不久疾作吾且去矣經七日王乃得疾國醫診治有加無瘳貴戚近臣憶師前記急發使告祖曰王殆至彌留願叔慈悲遠來診救祖即至慰問時宗勝再承王召即別巖間波羅提亦來問疾謂祖曰當何施為令王免若祖即令太子為王宥罪施恩崇奉三寶復為懺悔願罪消滅如是者三王疾有間師念震旦緣熟行化時至遂囑弟子不若密多羅住天竺傳法先辭祖塔次別同學後至王所慰而勉之曰當勤脩白業護持三寶吾去非晚一九即還王聞師言涕淚交集曰此國何罪彼土何祥叔既有緣非吾所止惟願不忘父母之國事畢早回王即具大舟實以眾寶躬率臣寮送至海壖祖泛重溟凡三周寒暑達于南海實梁普通七年庚子歲九月二十一日也廣州刺史蕭昂具主禮迎接表聞武帝帝覽奏遣使齎詔迎請十月一日至金陵帝問曰朕即位已來造寺寫經度僧不可勝紀有何功德祖曰並無功德帝曰何以無功德祖曰此但人天小果有漏之因如影隨形雖有非實帝曰如何是真功德祖曰淨智妙圓體自空寂如是功德不以世求帝又問如何是聖諦第一義祖曰廓然無聖帝曰對朕者誰祖曰不識帝不領悟祖知機不契是月十九日潛回江北十一月二十三日屆洛陽寓止嵩山少林寺面壁而坐終日默然人莫之測謂之壁觀婆羅門有僧神光久居伊洛博覽羣籍善談玄理每嘆曰孔老之教禮術風規莊易之書未盡妙理近聞達磨大士住止少林至人不遙當造玄境遂詣祖參承祖常端坐面壁莫聞誨勵光自惟曰昔人求道敲骨取髓刺血濟饑布髮掩泥投崖飼虎古尚若此我又何人值大雪光夜侍立遲明積雪過膝立愈恭祖顧而憫之問曰汝久立雪中當求何事光悲泪曰惟願和尚慈悲開甘露門廣度羣品祖曰諸佛無上妙道曠劫精勤難行能行非忍而忍豈以小德小智輕心慢心欲冀真乘徒勞勤苦光聞祖誨勵潛取利刀自斷左臂罪于祖前祖知是法器乃曰諸佛最初求道為法忘形汝今斷臂吾前求亦可在祖遂因與易名曰慧可可曰諸佛法印可得聞乎祖曰諸佛法印匪從人得可曰我心未寧乞師與安祖曰將心來與汝安可良久曰覓心了不可得祖曰我與汝安心竟面門壁立示全機逼塞乾坤若個知纔被神光展三拜分明喪却兩莖眉覓心不可得兩眼大豁開與汝安心竟清風動地來魏孝明帝正光年也越九年欲返天竺命門人曰時將至矣汝等盍言所得乎有道副對曰如我所見不執文字不離文字而為道用祖曰汝得吾皮尼總持曰我今所解如慶喜見阿閦佛國一見更不再見祖曰汝得吾肉道育曰四大本空五陰非有而我見處無一法可得祖曰汝得吾骨最後慧可禮拜依位而立祖曰汝得我髓乃顧慧可而告之曰昔如來以正法眼付迦葉大士展轉囑累而至於我我今付汝汝當護持并授汝袈裟以為法信可曰請師指陳祖曰內傳法印以契證心外付袈裟以定宗旨後代澆薄疑慮競生云吾西天之人言汝此方之子憑何得法以何證之汝今受此衣法却後難生但出此衣并吾法偈用以表明其化無礙至吾滅後二百年衣止不傳法周沙界明道者多行道者少說理者多通理者少潛符密證千萬有餘汝當闡揚勿輕未悟一念回機便同本得聽吾偈曰吾本來茲土傳法救迷情一花開五葉結果自然成吾自到此凡五度中毒我甞自出而試之置石石裂緣我本離南印來此東土見赤縣神州有大乘氣象遂踰海越漠為法求人際會未諧如愚若訥今得汝傳授吾意已終鐵枷欲卸力無從逼令兒曹逐欵供拜立謾云真得髓洪波迎處有蟠龍言已端居而逝葬熊耳山起塔于定林寺後三歲魏宋雲奉使西域回遇祖于𦵇領見手擕隻履翩翩獨逝雲問祖何往祖曰西天去雲歸具說其事及門人啟壙唯空棺存一革履舉朝為之驚嘆奉詔取遺履于少林寺供養航海而來踢翻窠臼面壁九年作家根究六宗坐斷兮五印聲馳全心揭露兮神光立就誰云隻履已西歸熊耳至今白如晝二祖慧可大師武牢人姬氏子父寂以無子禱祈既久一夕有異光炤室母遂懷姙故生而名之曰光少則超然博極載籍尤善談老莊後覧佛乘遂盡棄去依寶靜禪師出家徧學大小乘義年三十三返香山終日燕坐又八年于寂默中忽見一神人謂曰將欲受果汝其南矣翌日覺頭痛如刺欲治之忽聞空中曰此換骨也往見靜述其事靜視之見頂骨嶢然如五峯秀出以有神異更名神光靜語祖曰汝相吉祥而神令汝南彼少林有達磨大士必汝師矣祖遂造少室逮得法至北齊天平二年有一居士年踰四十不言名氏聿來設禮而問祖曰弟子身纏風恙請和尚懺罪祖曰將罪來與汝懺士良久曰覓罪了不可得祖曰與汝懺罪竟宜依佛法僧住士曰今見和尚已知是僧未審何名佛法祖曰是心是佛是心是法法佛無二僧寶亦然士曰今日始知罪性不在內不在外不在中間如其心然佛法無二也祖深器之即為剃髮曰是吾寶也名僧璨其年三月十八於光福寺受具自茲疾漸愈執侍經二載祖遂囑累付以衣法偈曰本來緣有地因地種花生本來無有種花亦不曾生又曰汝受吾教宜處深山未可行化當有國難般若多羅懸記所謂心中雖吉外頭凶者是也吾亦有宿累今往酬之汝諦思聖記勿離世難善去善行俟時傳付滿身瘋恙滿身愁覓罪分明叵得由從此通身都改變正生瘋處正風流祖乃往鄴都化導四眾歸依三十四載遂韜光混跡變易儀相或入酒肆或過屠門或習街談或隨廝役或問之曰師是道人何故如是祖曰我自調心何關汝事法法只因無咎咎心心多謂不真心寒猿夜哭巫山月客路原來不可行後至筦城縣匡救寺說法有辨和法師正于寺講涅槃經其徒多去之而從祖和憤嫉興謗于邑宰翟仲侃侃加祖以非法祖怡然委順識真者謂之償債時年一百七矣隋文帝開皇十三年癸丑三月十六日也葬磁州陽縣東北七十里唐德宗諡大祖禪師安心與覓罪畢竟無別旨展轉相傳無風浪自起三祖僧璨大士以白衣謁二祖得度傳法後隱于舒之皖公山往來太湖縣司空山當後周毀法祖深自韜晦居無常處積十餘載人無能知者至隋開皇十二年有沙彌道信年始十四來禮祖曰願和尚慈悲乞與解脫法門祖曰誰縛汝曰無人縛祖曰何更求解脫乎信于言下大悟服勞九載後于吉州受戒侍奉尤謹祖屢試以玄微知其緣熟乃付衣法偈曰花種雖因地從地種花生若無人下種花地盡無生祖有信心銘近千言其略曰至道無難唯嫌揀擇但莫憎愛洞然明白毫厘有差天地懸隔欲得現前莫存順逆寄跡空山形單影孑晚得童子皮下有血四祖道信大師者姓司馬氏世居河內後徙於蘄州廣濟縣生而超異幼慕空宗諸解脫門宛如宿習既嗣祖風攝心無寐脇不至席者六十年隋大業十三載領徒眾抵吉州值羣盜圍城七旬不解眾甚惶怖師教令念摩訶般若時賊眾望雉堞間若有神兵乃相謂曰城內必有異人不可攻矣稍稍引去一日往黃梅縣路逢一小兒骨相奇秀異乎嘗童祖問曰子何姓答曰姓即有不是嘗姓祖曰是何姓答曰是佛姓祖曰汝無姓耶答曰性空故無祖默識其法器即俾侍者至其母所乞令出家母以宿緣故殊無難色遂捨為弟子以至付法傳衣偈曰華種有生性因地華生生大緣與性合當生生不生宿習解脫門早佩祖師印皇詔四微不出山寇圍吉水民無災末後黃梅一枝秀至今香花帀地開五祖弘忍大師者蘄州黃梅人也先為破頭山中栽松道者甞請于四祖曰法道可得聞乎祖曰汝已老脫有聞其能廣化耶倘若再來吾尚可遲汝乃去行水邊見一女子浣衣揖曰寄宿得否女曰我有父兄可往求之曰諾我即敢行女首肯之即回䇿而去女周氏季子也歸輒孕父母大惡逐之女無所歸日傭紡里中夕止于眾舘之下已而生一子以為不祥因拋逐港中明日見泝流而上氣體鮮明大驚異遂舉之成童隨母乞食里人呼為無姓兒逢一智者歎曰此子缺七種相不逮如來後遇信大師得法嗣化于破頭山誰是前身孰後身分明有口也難伸無端累彼周家女疑殺世間多少人咸亨中有居士姓盧名慧能自新州來參謁祖問曰汝自何來盧曰嶺南祖曰欲須何事盧曰惟求作佛祖曰嶺南人無佛性若為得佛盧曰人即有南北佛性豈然祖令隨眾作務盧曰弟子自性甞生智慧不離自性即是福田未審和尚教作何務祖曰者獦獠根性太利著槽廠去盧禮足而退便入碓坊服勞於杵臼晝夜不息經八月祖知付授時至告眾曰正法難解不可徒記吾言持為己任汝等各自隨意述一偈若語意冥符則衣法皆付時會下七百餘僧上座神秀者學通內外眾所宗仰咸推稱曰若非尊秀疇敢當之神秀竊聆眾譽不復思惟乃于廊壁書一偈曰身是菩提樹心如明鏡臺時時勤拂拭莫使惹塵埃祖因經行忽見此偈知是神秀所述乃讚歎曰後代依此修行亦得勝果盧在碓坊忽聆誦偈乃問同學是何章句同學曰汝不知和尚求法嗣令各述心偈此則秀上座所述和尚深加歎賞必將付法傳衣也盧曰其偈云何同學為誦盧良久曰美則美矣了則未了同學訶曰庸流何知勿發狂言盧曰子不信耶願以一偈和之同學不答相視而笑盧至夜密告一童子引至廊下盧自秉燭請別駕張日用于秀偈之側寫一偈曰菩提本無樹明鏡亦非臺本來無一物何處惹塵埃祖後見此偈曰此是誰作亦未見性眾聞祖語遂不之顧逮夜祖潛詣碓房問曰米白也未盧曰白也未有篩祖以杖三擊其碓盧即以三鼓入室祖告曰諸佛出世為一大事故隨機大小而引導之遂有十地三乘頓漸等旨以為教門然以無上微妙秘密圓明真實正法眼藏付于上首大迦葉尊者展轉傳授二十八世至達磨屆于此土得可大師承襲至今以法寶及所傳袈裟用付于汝善自保護無令斷絕聽吾偈曰有情來下種因地果還生無情既無種無性亦無生盧跪受訖問法則既受衣付何人祖曰昔達磨初至人未之信故傳衣以明得法今信心已熟衣乃爭端止于汝身不復傳也來時有約生處難稽黃梅果熟任風吹一卷金剛成露布六祖慧能大師姓盧氏父行瑫母李氏感異夢覺而異香滿室因有娠六年乃生毫光騰空黎明有僧來語祖之父曰此子可名慧能父曰何謂也僧曰慧者以法惠濟眾生能者能作佛事語畢不知所之祖不飲母乳遇夜神人灌以甘露三歲父喪母嫠居家貧甚幼則樵採鬻薪以養母一日負薪過市中聞客讀金剛經至應無所住而生其心有所感悟而問客曰此何法也曰此金剛經黃梅東山五祖忍和尚恒教人誦此經祖聞語勃然思出家求法乃乞于一客為其母備歲儲遂辭母直抵韶州遇高行士劉志略結為交友尼無盡藏者即志略姑也甞讀涅槃經師暫聽之即為解說其義尼遂執卷問字祖曰字即不識義即請問尼曰字尚不識曷能會義祖曰諸佛妙理非關文字尼驚異之告鄉里耆艾請居寶林寺寺廢已久四眾營緝朝夕奔凑俄成寶坊祖曰我求大法止此何為遂棄之抵黃梅參禮五祖三鼓入室五祖復徵其初悟應無所住而生其心語祖言下大徹遂啟五祖曰一切萬法不離自性何期自性本自清淨何期自性本不生滅何期自性本自具足何期自性本不動搖何期自性能生萬法五祖知悟本性謂祖曰不識本心學法無益若識本心見自本性即天人師佛遂傳衣法五祖送至九江驛邊令祖上船祖即把櫓五祖曰合是吾度汝祖曰迷時師度悟時自度度名雖一用處不同能蒙師傳法今已得悟只合自性自度五祖曰如是如是佛法繇汝大行六祖當年不丈夫倩人書壁自塗糊分明有偈言無物却受他家一鉢盂祖禮辭南行者兩月至大庾嶺僧惠明本將軍同數百人來欲奪衣鉢祖擲衣鉢于石曰此衣表信可力爭耶明舉衣鉢不能動乃曰我為法來不為衣來祖曰汝既為法來可屏息諸緣勿生一念吾為汝說明良久祖曰不思善不思惡正與麼時那箇是明上座本來面目惠明言下大悟復問曰上來密語密意外還更有密意旨否祖曰與汝說者即非密也汝若返炤密在汝邊明曰惠明雖在黃梅實未省自己面目今蒙指示如人飲水冷煖自知後隱于懷集四會之間混獵人隊中十有六載儀鳳元年正月八日忽念說法時至遂出至廣州法性寺值印宗法師講涅槃經寓止廊廡間暮夜風颺剎幡聞二僧對論一曰幡動一曰風動往復不已祖曰不是風動不是幡動仁者心動一眾竦然非是幡兮非是風衲僧于此作流通渡河用筏尋常事南山燒炭北山紅正月十五日印宗會諸名德為祖剃髮二月八日就法性寺智光律師受滿分戒其戒壇即宋求那䟦陀三藏之所置也三藏記云後當有肉身菩薩在此壇受戒又梁末真諦三藏于壇之側手植二菩提樹謂眾曰却後一百二十年有大開士于此樹下演無上乘度無量眾祖受戒已於此樹下開東山法門宛如宿契中宗元年遣內侍薛簡馳詔迎請祖上表辭疾願終林麓簡曰京城禪德皆云欲得會道必須坐禪習定未審師說何如祖曰道由心悟豈在坐也經云若見如來若坐若臥是行邪道何故無所從來亦無所去若無生滅是如來清淨禪諸法空寂是如來清淨坐究竟無証而況坐耶簡問心要祖曰道無明暗明暗是代謝之義明暗無盡亦是有盡相待立名經云法無有比無相待故簡曰明喻智慧暗況煩惱祖曰煩惱即是菩提無二無別若以智慧炤煩惱者此是二乘小見大智上根悉不如是簡問大乘祖曰明與無明其性無二無二之性即是實性實性者處凡愚而不減在賢聖而不增住煩惱而不亂居禪定而不寂不斷不常不來不去不在中間及其內外不生不滅性相如如常住不遷名之曰道簡曰師說不生不滅何異外道祖曰外道所說不生不滅者將滅止生以生顯滅我說不生滅者本自無生今亦無滅汝若欲知心要但一切善惡都莫思量自然得入清淨心體湛然常寂妙用恒沙簡蒙教豁然大悟祖至曹溪寶林覩堂宇湫隘謁里人陳啞仙曰老僧欲乞檀那一坐具地啞仙唯然祖展坐具彌布曹溪四境坐具恁麼寬四境恁麼縮是神通非神通祖一日謂眾曰汝等諸人自心是佛更莫狐疑外無一物而能建立皆是本心生萬種法若欲成就種種智須達一相三昧一行三昧若于一切處而不住相彼相中不生憎愛亦無取舍不念利益成敗等事安閒恬靜虗融淡泊此名一相三昧若于一切處行住坐臥純一直心不動道場直成淨土名一行三昧若人具二三昧如地有種能含藏長養神秀禪師姓李汴州尉氏人少遍覧經史隋末出家師事弘忍忍謂秀曰吾度多人矣至于懸解圓炤無先汝者弘忍以咸亨五年卒神秀乃往荊州居于當陽山則天聞其名追赴都肩輿上殿親加跪禮敕當陽山置度一寺以旌其德時王公以下士庶謁見望塵拜伏中宗即位尤加敬異秀與慧能同學弘忍卒後能往韶州廣果寺天下各傳其道謂神秀為北宗慧能為南宗桃花雪白李花紅日出西方夜落東南嶽懷讓禪師禮祖祖曰何處來曰嵩山祖曰甚麼物恁麼來曰說似一物即不中祖曰還假修證否曰修證即不無污染即不得祖曰只此不污染諸佛之所護念汝既如是吾亦如是西天般若多羅讖汝足下出一馬駒踏殺天下人應在汝躳青原行思禪師參祖問曰當何所務即不落階級祖曰汝曾作甚麼來曰聖諦亦不為祖曰落何階級曰聖諦尚不為何階級之有祖深器之時得法者三十人嶽原獨首曹溪永嘉玄覺禪師少習經論精天台止觀法門閱維摩經發明心地後遇左谿朗禪師激勵與陽䇿禪師同詣曹溪初到振錫繞三帀卓然而立祖曰夫沙門者具三千威儀八萬細行大德自何方來生大我慢曰生死事大無常迅速祖曰何不體取無生了無速乎曰體即無生了本無速祖曰如是如是於時大眾無不愕然覺方具威儀參禮須臾告辭祖曰返太速乎少留一宿時謂一宿覺僧智通看楞伽經約千餘徧不會三身四智禮祖求解祖曰三身者清淨法身汝之性也圓滿報身汝之智也千百億身汝之行也若離本性別說三身即名有身無智若悟三身無有自性即名四智菩提聽吾偈曰自性具三身發明成四智不離見聞緣超然登佛地吾今為汝說諦信永無迷莫學馳求者終日說菩提通曰四智之義可得聞乎祖曰既會三身便明四智何更問耶若離三身別談四智此名有智無身即此有智還成無智復說偈曰大圓鏡智性清淨平等性智心無病妙觀察智見非功成所作智同圓鏡五八六七果因轉但用名言無實性若於轉處不留情繁興永處耶伽定轉前五識為成所作智轉第六識為妙觀察智轉第七識為平等性智轉第八識為大圓鏡智六七因中轉五八果上轉名轉體不轉僧問黃梅意旨甚麼人得祖曰會佛法人得曰和尚還得否祖曰我不會佛法七月八日謂門人曰吾欲歸新州汝等速理舟楫大眾哀留甚堅祖曰諸佛出現猶示涅槃有來必去理亦當然吾此形骸歸必有所眾曰師從此去早晚可回祖曰落葉歸根來時無口賣柴字不識金剛得透入三更進室舉宗綱心動折却風鈴議從茲甘露遍寰中鳥近金山無異色且道來時無口為門人答話耶說道理耶嘻非但來時無口去時亦無鼻孔金粟百癡禪師評黃面瞿曇敗闕不少二三四七狼籍轉多居士傍觀者清到底翻成露布可惜金粟臂長袖短無力與他剗除雖然如是虗空包不盡大地載不起何必于斯來下嘴所謂英靈自有英靈眼得英靈處見英靈
